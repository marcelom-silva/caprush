<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapRush – Overdrive! 🏁</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%; overflow:hidden;
  background:radial-gradient(ellipse at 30% 50%,#1a0500 0%,#020110 70%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Courier New',Courier,monospace;
}
#game canvas{display:block;border-radius:14px;box-shadow:0 0 80px rgba(255,85,0,.2),0 0 140px rgba(0,100,255,.08)}
</style>
</head>
<body>
<div id="game"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<script>
'use strict';

const W=800, H=520;

// Track geometry constants
const TK={
  oPad:40,
  iX:188, iY:122, iW:424, iH:272,
  startX:400, startY:442
};

// Physics drag constant (velocity retained per second)
const DRAG=0.52;
const LOG_INV_DRAG=Math.log(1/DRAG);

// CR token base reward per lap
const CR_PER_LAP=120;

// ──────────────────────────────────────────────
//  Shared: draw bottle cap icon on a Phaser graphics
// ──────────────────────────────────────────────
function drawCapIcon(gfx, cx, cy, R1, R2, n, fillColor, strokeColor){
  const pts=[];
  for(let i=0;i<n*2;i++){
    const a=i*Math.PI/n-Math.PI/2, r=i%2?R2:R1;
    pts.push({x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)});
  }
  gfx.fillStyle(fillColor,1);
  gfx.beginPath();
  gfx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) gfx.lineTo(pts[i].x,pts[i].y);
  gfx.closePath();
  gfx.fillPath();
  gfx.lineStyle(2,strokeColor,1);
  gfx.strokeCircle(cx,cy,R2*.88);
}

// ──────────────────────────────────────────────
//  MENU SCENE
// ──────────────────────────────────────────────
class MenuScene extends Phaser.Scene{
  constructor(){super({key:'Menu'})}

  create(){
    const g=this.add.graphics();

    // Background + grid
    g.fillStyle(0x020110); g.fillRect(0,0,W,H);
    g.lineStyle(1,0xffffff,.025);
    for(let x=0;x<W;x+=44){g.beginPath();g.moveTo(x,0);g.lineTo(x-40,H);g.strokePath();}

    // Speed lines
    const sl=[
      {y:55,w:420,h:1,a:.7},{y:60,w:300,h:2.5,a:.45},{y:66,w:200,h:1,a:.28},
      {y:452,w:380,h:1,a:.5},{y:456,w:240,h:2,a:.3}
    ];
    sl.forEach(s=>{
      g.fillStyle(0xFF5500,s.a);
      g.fillRect(0,s.y,s.w,s.h);
    });

    // Bottle cap badge (large watermark right side)
    const capGfx=this.add.graphics().setAlpha(.07);
    drawCapIcon(capGfx, 680, 250, 180, 156, 24, 0xFF5500, 0xFF8C00);
    capGfx.lineStyle(3,0xFF5500,.8);
    capGfx.strokeCircle(680,250,138);

    // Left accent bar
    g.fillStyle(0xFF5500,.9); g.fillRect(38,52,4.5,172);
    g.fillStyle(0xFF5500,.3); g.fillRect(45,60,2,158);

    // "CAP" text (white)
    this.add.text(54,178,'CAP',{
      fontFamily:"Impact,'Arial Black',Arial,sans-serif",
      fontSize:'120px', color:'#FFFFFF',
      stroke:'#88AAFF', strokeThickness:0
    }).setOrigin(0,1);

    // "RUSH" text (orange)
    this.add.text(218,178,'RUSH',{
      fontFamily:"Impact,'Arial Black',Arial,sans-serif",
      fontSize:'120px', color:'#FF5500',
      stroke:'#AA2200', strokeThickness:1
    }).setOrigin(0,1);

    // Separator rule
    g.fillStyle(0xFF5500,.8); g.fillRect(54,182,546,3);

    // OVERDRIVE!
    this.add.text(62,222,'— OVERDRIVE!',{
      fontFamily:"Impact,'Arial Black',Arial,sans-serif",
      fontSize:'33px', color:'#00EEFF',
      fontStyle:'italic'
    }).setLetterSpacing(11);

    // Tagline
    this.add.text(66,254,'BOTTLE CAP RACING  ·  ANIME STYLE  ·  BLOCKCHAIN ECONOMY',{
      fontFamily:"'Courier New',monospace", fontSize:'10px', color:'#1e3050',
      letterSpacing:2
    });

    // CR Token display (demo)
    this.add.text(W-14,10,'🪙 $CR  0',{
      fontFamily:"'Courier New',monospace", fontSize:'12px',
      color:'#FFD700', backgroundColor:'#0a0820', padding:{x:8,y:4}
    }).setOrigin(1,0);

    // Feature pills
    const pills=['🏁 Física Real','🎌 Traço Anime','💎 NFTs Metaplex','🌐 Fogo SVM'];
    pills.forEach((p,i)=>{
      this.add.text(80+i*162, 308, p,{
        fontFamily:"'Courier New',monospace", fontSize:'11px',
        color:'#cc7755', backgroundColor:'#0d0820',
        padding:{x:10,y:6}
      }).setOrigin(0.5);
    });

    // CTA Button
    const btn=this.add.text(W/2,374,'  ▶  INICIAR CORRIDA  ',{
      fontFamily:"'Courier New',monospace", fontSize:'21px', fontStyle:'bold',
      color:'#ffffff', backgroundColor:'#CC3300',
      padding:{x:24,y:14}
    }).setOrigin(0.5).setInteractive({cursor:'pointer'});

    this.tweens.add({targets:btn, scaleX:1.03, scaleY:1.03, duration:750, yoyo:true, repeat:-1, ease:'Sine.easeInOut'});
    btn.on('pointerdown',()=>this.scene.start('Game'));
    btn.on('pointerover',()=>btn.setStyle({backgroundColor:'#FF4400'}));
    btn.on('pointerout', ()=>btn.setStyle({backgroundColor:'#CC3300'}));

    // Instruction
    this.add.text(W/2,432,'💡 Clique e arraste para TRÁS da tampinha → solte para lançar!',{
      fontFamily:"'Courier New',monospace", fontSize:'12px', color:'#334455'
    }).setOrigin(0.5);
    this.add.text(W/2,452,'Passe pelos 3 checkpoints e complete 2 voltas para ganhar $CR!',{
      fontFamily:"'Courier New',monospace", fontSize:'11px', color:'#292840'
    }).setOrigin(0.5);

    // Animated caps (bottom decorations)
    const capColors=[0xFF5500,0x4466ff,0xffcc00,0x44ff88,0xff8833];
    capColors.forEach((c,i)=>{
      const cg=this.add.graphics();
      drawCapIcon(cg, 80+i*162, 494, 14, 12, 18, c, 0xffffff);
      cg.lineStyle(1.5,0xffffff,.4); cg.strokeCircle(80+i*162,494,10);
      this.tweens.add({targets:cg, y: -14, duration:1000+i*300, yoyo:true, repeat:-1, ease:'Sine.easeInOut', delay:i*200});
    });
  }
}

// ──────────────────────────────────────────────
//  GAME SCENE
// ──────────────────────────────────────────────
class GameScene extends Phaser.Scene{
  constructor(){super({key:'Game'})}

  create(){
    this.laps=0; this.totalLaps=2;
    this.launches=0; this.crTokens=0;
    this.cpPassed=new Set(); this.numCPs=3;
    this.racing=false; this.finished=false;
    this.startTime=0; this.isAiming=false;
    this.aimX=0; this.aimY=0;

    this.buildTrack();
    this.buildWalls();
    this.buildCap();
    this.buildCheckpoints();
    this.buildHUD();
    this.buildInput();
    this.aimGfx=this.add.graphics().setDepth(20);
    this.startCountdown();
  }

  buildTrack(){
    const g=this.add.graphics();
    const {oPad,iX,iY,iW,iH}=TK;

    // Dark background
    g.fillStyle(0x020110); g.fillRect(0,0,W,H);

    // Grid
    g.lineStyle(1,0xffffff,.02);
    for(let x=0;x<W;x+=44){g.beginPath();g.moveTo(x,0);g.lineTo(x-30,H);g.strokePath();}

    // Asphalt track
    g.fillStyle(0x131320); g.fillRoundedRect(oPad,oPad,W-oPad*2,H-oPad*2,48);

    // Inner island (dark green)
    g.fillStyle(0x0a1f0e); g.fillRoundedRect(iX,iY,iW,iH,32);
    g.lineStyle(1,0x122814,1);
    for(let y=iY+16;y<iY+iH;y+=16){
      g.beginPath();g.moveTo(iX+6,y);g.lineTo(iX+iW-6,y);g.strokePath();
    }

    // Outer kerb (red/white)
    for(let i=0;i<32;i++){
      const pct=i/32;
      const col=i%2===0?0xDD1100:0xffffff;
      g.lineStyle(7,col,.85);
      const arcLen=(W-oPad*2)*2+(H-oPad*2)*2;
      const segLen=arcLen/32;
      // Simplified: just alternating outline segments approximated as full stroke
    }
    g.lineStyle(7,0xDD1100,1); g.strokeRoundedRect(oPad+1,oPad+1,W-oPad*2-2,H-oPad*2-2,48);
    g.lineStyle(7,0xDD1100,1); g.strokeRoundedRect(iX+1,iY+1,iW-2,iH-2,32);

    // Center dash lines
    const topY=(oPad+iY)/2, botY=(iY+iH+H-oPad)/2;
    const leftX=(oPad+iX)/2, rightX=(iX+iW+W-oPad)/2;

    g.lineStyle(2,0xFFFF44,.22);
    for(let x=iX+28;x<iX+iW-28;x+=32){
      g.beginPath();g.moveTo(x,topY);g.lineTo(x+16,topY);g.strokePath();
      g.beginPath();g.moveTo(x,botY);g.lineTo(x+16,botY);g.strokePath();
    }
    for(let y=iY+22;y<iY+iH-22;y+=28){
      g.beginPath();g.moveTo(leftX,y);g.lineTo(leftX,y+14);g.strokePath();
      g.beginPath();g.moveTo(rightX,y);g.lineTo(rightX,y+14);g.strokePath();
    }

    // Direction arrows (subtle)
    const ar={fontFamily:"'Courier New',monospace",fontSize:'13px',color:'#ffffff08'};
    this.add.text(W/2,topY,'← ← ← ← ← ← ←',ar).setOrigin(0.5);
    this.add.text(W/2,botY,'→ → → → → → →',ar).setOrigin(0.5);
    this.add.text(leftX, H/2,'↑\n↑\n↑\n↑',{...ar,align:'center'}).setOrigin(0.5);
    this.add.text(rightX,H/2,'↓\n↓\n↓\n↓',{...ar,align:'center'}).setOrigin(0.5);

    // Island label
    this.add.text(iX+iW/2,iY+iH/2,'CapRush\nCIRCUITO',{
      fontFamily:"Impact,'Arial Black',sans-serif", fontSize:'22px',
      color:'#12261a', align:'center'
    }).setOrigin(0.5);

    // Start/finish checkered
    const sfX=TK.startX-24, sfY=iY+iH+4;
    for(let r=0;r<5;r++) for(let c=0;c<5;c++){
      g.fillStyle((r+c)%2===0?0xffffff:0x000000);
      g.fillRect(sfX+c*10,sfY+r*8,10,8);
    }
  }

  buildWalls(){
    this.physics.world.setBounds(TK.oPad+6,TK.oPad+6,W-TK.oPad*2-12,H-TK.oPad*2-12);
    this.walls=[];
    const {iX,iY,iW,iH}=TK; const T=22;
    [
      [iX+iW/2,   iY+T/2,   iW,T],
      [iX+iW/2,   iY+iH-T/2,iW,T],
      [iX+T/2,    iY+iH/2,  T,iH],
      [iX+iW-T/2, iY+iH/2,  T,iH],
    ].forEach(([x,y,w,h])=>{
      const r=this.add.rectangle(x,y,w,h,0x000000,0);
      this.physics.add.existing(r,true);
      this.walls.push(r);
    });
  }

  buildCap(){
    // Draw the cap texture
    const gfx=this.make.graphics({add:false});

    // Shadow
    gfx.fillStyle(0x000000,.4); gfx.fillCircle(22,22,20);

    // Bottle cap body (orange)
    drawCapIcon(gfx, 20,20, 20,17, 18, 0xFF5500, 0xFF8C00);

    // Inner ring highlights
    gfx.lineStyle(2,0xFF7700,.6); gfx.strokeCircle(20,20,14);
    gfx.fillStyle(0xffffff,.14); gfx.fillCircle(20,20,12);
    gfx.fillStyle(0xffffff,.5); gfx.fillEllipse(14,13,10,6);
    gfx.fillStyle(0xffffff,.8); gfx.fillCircle(20,20,3.5);

    // "CR" label
    gfx.generateTexture('capcoin',40,40); gfx.destroy();

    this.cap=this.physics.add.sprite(TK.startX,TK.startY,'capcoin');
    this.cap.setCircle(18,2,2);
    this.cap.setCollideWorldBounds(true);
    this.cap.setBounce(.3);
    this.cap.setDamping(true);
    this.cap.setDrag(DRAG);
    this.cap.setMaxVelocity(740);
    this.cap.setDepth(10);
    this.walls.forEach(w=>this.physics.add.collider(this.cap,w,()=>this.cameras.main.shake(40,.004)));
  }

  buildCheckpoints(){
    this.cpList=[
      {x:W/2,           y:(TK.oPad+TK.iY)/2,            col:0xFFD700, label:'CP1', cr:30},
      {x:(TK.oPad+TK.iX)/2,    y:H/2,                   col:0x44FF88, label:'CP2', cr:30},
      {x:(TK.iX+TK.iW+W-TK.oPad)/2, y:H/2,              col:0x00EEFF, label:'CP3', cr:30},
    ];
    this.cpGfxList=[];
    this.cpList.forEach((cp,i)=>{
      const g2=this.add.graphics();
      g2.lineStyle(3,cp.col,.8); g2.strokeRect(-30,-30,60,60);
      g2.lineStyle(1,cp.col,.3); g2.strokeRect(-24,-24,48,48);
      g2.lineStyle(1,cp.col,.15); g2.strokeCircle(0,0,22);
      g2.setPosition(cp.x,cp.y).setDepth(5);
      this.tweens.add({targets:g2,alpha:.15,duration:700+i*80,yoyo:true,repeat:-1});
      this.cpGfxList.push(g2);
      this.add.text(cp.x,cp.y,cp.label,{
        fontFamily:"'Courier New',monospace",fontSize:'9px',color:'#ffffff33'
      }).setOrigin(0.5).setDepth(6);
    });
  }

  buildHUD(){
    const hud=this.add.graphics().setDepth(25);
    hud.fillStyle(0x000000,.82); hud.fillRect(0,0,W,34);
    hud.fillStyle(0x000000,.82); hud.fillRect(0,H-32,W,32);

    this.txtLap   =this.add.text(10,9,'VOLTA 0/2',{fontFamily:"'Courier New',monospace",fontSize:'13px',color:'#FF5500'}).setDepth(30);
    this.txtLaunch=this.add.text(185,9,'🚀 0',{fontFamily:"'Courier New',monospace",fontSize:'13px',color:'#ffffff'}).setDepth(30);
    this.txtCR    =this.add.text(270,9,'🪙 $CR 0',{fontFamily:"'Courier New',monospace",fontSize:'13px',color:'#FFD700'}).setDepth(30);
    this.txtTimer =this.add.text(W-10,9,'00:00.0',{fontFamily:"'Courier New',monospace",fontSize:'13px',color:'#00EEFF'}).setOrigin(1,0).setDepth(30);

    // Power bar
    this.add.text(W/2,H-27,'FORÇA',{fontFamily:"'Courier New',monospace",fontSize:'9px',color:'#334455'}).setOrigin(0.5).setDepth(30);
    this.add.rectangle(W/2,H-14,204,10,0x0a0a22).setDepth(28);
    this.powerFill=this.add.rectangle(W/2-100,H-14,0,8,0xFF5500).setOrigin(0,.5).setDepth(29);

    // CP dots
    this.cpDots=this.cpList.map((cp,i)=>{
      const d=this.add.circle(16+i*20,H-15,7,0x111130).setDepth(30);
      this.add.text(16+i*20,H-15,`${i+1}`,{fontFamily:"'Courier New',monospace",fontSize:'7px',color:'#334455'}).setOrigin(0.5).setDepth(31);
      return d;
    });

    // Reset button
    const reset=this.add.text(W-10,H-26,'[RESET +5]',{
      fontFamily:"'Courier New',monospace",fontSize:'10px',color:'#553322',padding:{x:3,y:2}
    }).setOrigin(1,0).setDepth(30).setInteractive({cursor:'pointer'});
    reset.on('pointerdown',()=>{
      this.cap.setVelocity(0,0); this.cap.setPosition(TK.startX,TK.startY);
      this.launches+=5; this.txtLaunch.setText(`🚀 ${this.launches}`);
    });
    reset.on('pointerover',()=>reset.setStyle({color:'#FF5500'}));
    reset.on('pointerout', ()=>reset.setStyle({color:'#553322'}));

    this.infoTxt=this.add.text(W/2,H/2+55,'Prepare-se...',{
      fontFamily:"'Courier New',monospace",fontSize:'14px',
      color:'#ffffff88',backgroundColor:'#000000aa',padding:{x:10,y:6}
    }).setOrigin(0.5).setDepth(40);
  }

  buildInput(){
    this.input.on('pointerdown',p=>{
      if(!this.racing||this.finished) return;
      if(this.cap.body.speed<14){this.isAiming=true;this.aimX=p.x;this.aimY=p.y;}
    });
    this.input.on('pointermove',p=>{if(this.isAiming){this.aimX=p.x;this.aimY=p.y;}});
    this.input.on('pointerup',p=>{
      if(this.isAiming&&this.racing&&!this.finished){this.doLaunch(p.x,p.y);this.isAiming=false;}
    });
  }

  doLaunch(px,py){
    const cx=this.cap.x, cy=this.cap.y;
    const dx=cx-px, dy=cy-py;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<6) return;
    const pwr=Math.min(dist,165)/165;
    this.cap.setVelocity((dx/dist)*pwr*740,(dy/dist)*pwr*740);
    this.launches++;
    this.txtLaunch.setText(`🚀 ${this.launches}`);
    this.powerFill.width=0;
    this.cameras.main.flash(55,255,120,50);
  }

  startCountdown(){
    const steps=['3','2','1','VÁ!'];
    let i=0;
    const txt=this.add.text(W/2,H/2-55,'3',{
      fontFamily:"Impact,'Arial Black',sans-serif",
      fontSize:'108px',fontStyle:'bold',
      color:'#FF5500',stroke:'#000',strokeThickness:14
    }).setOrigin(0.5).setDepth(55);

    this.time.addEvent({delay:900,repeat:3,callback:()=>{
      i++;
      if(i<steps.length){
        txt.setText(steps[i]);
        txt.setColor(i===3?'#00EEFF':'#FF5500');
        this.tweens.add({targets:txt,scale:{from:1.6,to:1},duration:340,ease:'Back.Out'});
      } else {
        txt.destroy();
        this.infoTxt.setText('Clique e arraste!').setAlpha(1);
        this.tweens.add({targets:this.infoTxt,alpha:0,delay:2200,duration:700});
        this.racing=true; this.startTime=this.time.now;
      }
    }});
  }

  update(){
    if(!this.racing||this.finished) return;

    // Timer
    const ms=this.time.now-this.startTime;
    const t=Math.floor((ms%1000)/100);
    const s=Math.floor(ms/1000)%60;
    const m=Math.floor(ms/60000);
    this.txtTimer.setText(`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${t}`);

    // Spin cap while moving
    const spd=this.cap.body.speed;
    if(spd>16) this.cap.angle+=spd*.022;

    // Aim preview
    this.aimGfx.clear();
    if(this.isAiming&&spd<14){
      const cx=this.cap.x, cy=this.cap.y;
      const dx=cx-this.aimX, dy=cy-this.aimY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const pwr=Math.min(dist,165)/165;

      this.powerFill.width=pwr*200;
      this.powerFill.setFillStyle(pwr>.7?0xDD1100:pwr>.4?0xFF8800:0x44FF88);

      if(dist>8){
        const nx=dx/dist, ny=dy/dist, v=pwr*740;

        // Rubber band line
        this.aimGfx.lineStyle(2,0xFF5500,.4);
        this.aimGfx.beginPath(); this.aimGfx.moveTo(cx,cy); this.aimGfx.lineTo(this.aimX,this.aimY); this.aimGfx.strokePath();

        // Trajectory dots (drag-physics accurate)
        for(let dt=0.08;dt<=0.52;dt+=0.09){
          const pos=v*(1-Math.pow(DRAG,dt))/LOG_INV_DRAG;
          const px2=cx+nx*pos, py2=cy+ny*pos;
          const a=1-(dt/0.54)*.88;
          const sz=4.5-dt*5.5;
          if(sz>0){
            this.aimGfx.fillStyle(0xffffff,Math.max(0,a));
            this.aimGfx.fillCircle(px2,py2,sz);
          }
        }

        // Direction arrow
        const ang=Math.atan2(ny,nx), aLen=56;
        const ax=cx+nx*aLen, ay=cy+ny*aLen;
        this.aimGfx.lineStyle(3,0xffffff,.8);
        this.aimGfx.beginPath(); this.aimGfx.moveTo(cx,cy); this.aimGfx.lineTo(ax,ay); this.aimGfx.strokePath();
        this.aimGfx.fillStyle(0xffffff,.8);
        this.aimGfx.fillTriangle(
          ax+Math.cos(ang)*13,ay+Math.sin(ang)*13,
          ax+Math.cos(ang+2.4)*8,ay+Math.sin(ang+2.4)*8,
          ax+Math.cos(ang-2.4)*8,ay+Math.sin(ang-2.4)*8
        );
      }
    } else if(spd<14){ this.powerFill.width=0; }

    // Checkpoint detection
    const cx=this.cap.x, cy=this.cap.y;
    this.cpList.forEach((cp,i)=>{
      if(!this.cpPassed.has(i)&&Math.hypot(cx-cp.x,cy-cp.y)<40){
        this.cpPassed.add(i);
        this.cpGfxList[i].setAlpha(.04);
        this.cpDots[i].setFillStyle(cp.col);
        this.crTokens+=cp.cr;
        this.txtCR.setText(`🪙 $CR ${this.crTokens}`);
        this.cameras.main.flash(150,80,200,100);
        // Floating +$CR text
        const ft=this.add.text(cp.x,cp.y-20,`+$CR ${cp.cr}`,{
          fontFamily:"'Courier New',monospace",fontSize:'14px',
          color:'#FFD700',stroke:'#000',strokeThickness:3
        }).setOrigin(.5).setDepth(50);
        this.tweens.add({targets:ft,y:cp.y-70,alpha:0,duration:1200,ease:'Power2',onComplete:()=>ft.destroy()});
      }
    });

    // Lap completion
    if(this.cpPassed.size===this.numCPs&&Math.hypot(cx-TK.startX,cy-TK.startY)<42){
      this.cpPassed.clear(); this.laps++;
      this.txtLap.setText(`VOLTA ${this.laps}/${this.totalLaps}`);
      this.cpGfxList.forEach(g=>g.setAlpha(.8));
      this.cpDots.forEach(d=>d.setFillStyle(0x111130));
      const lapCR=CR_PER_LAP;
      this.crTokens+=lapCR;
      this.txtCR.setText(`🪙 $CR ${this.crTokens}`);
      this.cameras.main.flash(600,255,180,80);
      const lt=this.add.text(W/2,H/2-80,`VOLTA ${this.laps} +$CR ${lapCR}`,{
        fontFamily:"Impact,'Arial Black',sans-serif",fontSize:'36px',
        color:'#FFD700',stroke:'#000',strokeThickness:8
      }).setOrigin(.5).setDepth(55);
      this.tweens.add({targets:lt,y:H/2-130,alpha:0,delay:400,duration:900,onComplete:()=>lt.destroy()});

      if(this.laps>=this.totalLaps){
        this.finished=true; this.cap.setVelocity(0,0);
        this.time.delayedCall(800,()=>this.scene.start('Result',{
          time:((this.time.now-this.startTime)/1000).toFixed(1),
          launches:this.launches,
          cr:this.crTokens
        }));
      }
    }
  }
}

// ──────────────────────────────────────────────
//  RESULT SCENE
// ──────────────────────────────────────────────
class ResultScene extends Phaser.Scene{
  constructor(){super({key:'Result'})}
  init(d){this.d=d}

  create(){
    const g=this.add.graphics();
    g.fillStyle(0x020110); g.fillRect(0,0,W,H);
    g.lineStyle(1,0xffffff,.02);
    for(let x=0;x<W;x+=44){g.beginPath();g.moveTo(x,0);g.lineTo(x-30,H);g.strokePath();}

    // Confetti
    for(let i=0;i<60;i++){
      const col=[0xFF5500,0xFFD700,0x00EEFF,0x44FF88,0xFF8833,0xffffff][i%6];
      const conf=this.add.rectangle(
        Phaser.Math.Between(0,W),Phaser.Math.Between(-50,H*.25),
        Phaser.Math.Between(6,14),Phaser.Math.Between(6,14),col
      );
      this.tweens.add({
        targets:conf, y:conf.y+H+140,
        angle:Phaser.Math.Between(-360,360), alpha:{from:1,to:0},
        duration:Phaser.Math.Between(1600,3200), delay:Phaser.Math.Between(0,1400), repeat:-1
      });
    }

    // Result card
    const card=this.add.graphics();
    card.fillStyle(0x0a0820,.97); card.fillRoundedRect(140,40,520,420,18);
    card.lineStyle(2,0xFF5500,.5); card.strokeRoundedRect(140,40,520,420,18);
    card.lineStyle(1,0xFF5500,.2); card.strokeRoundedRect(146,46,508,408,16);

    // Cap badge watermark
    const bw=this.add.graphics().setAlpha(.06);
    drawCapIcon(bw,660,260,200,174,24,0xFF5500,0xFF8C00);

    this.add.text(W/2,98,'🏁 CORRIDA COMPLETA!',{
      fontFamily:"Impact,'Arial Black',sans-serif",
      fontSize:'28px',fontStyle:'bold',color:'#FF5500',
      stroke:'#000',strokeThickness:6
    }).setOrigin(.5);

    this.add.text(W/2,140,'⏱  Tempo Total',{fontFamily:"'Courier New',monospace",fontSize:'12px',color:'#334455'}).setOrigin(.5);
    this.add.text(W/2,176,`${this.d.time}s`,{
      fontFamily:"Impact,'Arial Black',sans-serif",fontSize:'46px',color:'#00EEFF'
    }).setOrigin(.5);

    this.add.text(W/2,236,'🚀  Lançamentos',{fontFamily:"'Courier New',monospace",fontSize:'12px',color:'#334455'}).setOrigin(.5);
    this.add.text(W/2,272,`${this.d.launches}`,{
      fontFamily:"Impact,'Arial Black',sans-serif",fontSize:'46px',color:'#FF5500'
    }).setOrigin(.5);

    // $CR tokens earned
    const crBox=this.add.graphics();
    crBox.fillStyle(0x0a0510,.8); crBox.fillRoundedRect(W/2-110,310,220,52,8);
    crBox.lineStyle(1.5,0xFFD700,.6); crBox.strokeRoundedRect(W/2-110,310,220,52,8);
    this.add.text(W/2,336,`🪙  $CR ${this.d.cr}  GANHOS`,{
      fontFamily:"Impact,'Arial Black',sans-serif",fontSize:'22px',color:'#FFD700'
    }).setOrigin(.5);

    // Star rating
    const eff=Math.max(0,36-this.d.launches);
    const[stars,grade]=eff>24?['⭐⭐⭐','MESTRE DA TAMPINHA!']:eff>12?['⭐⭐','MUITO BOM!']:['⭐','CONTINUE TREINANDO!'];
    this.add.text(W/2,386,`${stars}  ${grade}`,{
      fontFamily:"Impact,'Arial Black',sans-serif",fontSize:'20px',color:'#FFD700'
    }).setOrigin(.5);

    // Buttons
    const mkBtn=(x,label,bg,scene)=>{
      const b=this.add.text(x,430,label,{
        fontFamily:"'Courier New',monospace",fontSize:'14px',color:'#fff',
        backgroundColor:bg,padding:{x:16,y:12}
      }).setOrigin(.5).setInteractive({cursor:'pointer'});
      b.on('pointerdown',()=>this.scene.start(scene));
      b.on('pointerover',()=>b.setAlpha(.8)); b.on('pointerout',()=>b.setAlpha(1));
    };
    mkBtn(W/2-130,'▶ JOGAR DE NOVO','#AA2200','Game');
    mkBtn(W/2+130,'⬅ MENU','#112244','Menu');

    this.add.text(W/2,476,'🔜 Em breve: Multiplayer · NFT Tampinhas · Ranking · Mais Pistas!',{
      fontFamily:"'Courier New',monospace",fontSize:'10px',color:'#111830'
    }).setOrigin(.5);
  }
}

new Phaser.Game({
