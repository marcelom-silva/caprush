<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script async src="https://vibej.am/2026/widget.js"></script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CapRush - Ranking</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  html, body {
  width: 100%;
  height: 100%;
}

body {
  min-height: 100vh;
  width: 100%;
  overflow-x: hidden;
  overflow: hidden;
  position: relative;
}
:root{--red:#FF2A2A;--gold:#FFD700;--dark:#0A0A0F;--acc:#00E5FF}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:#E8E8F0;font-family:'Rajdhani',sans-serif;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;z-index:-2;background:radial-gradient(1200px 800px at 80% -20%,rgba(255,42,42,.1),transparent 60%),radial-gradient(900px 600px at 10% 120%,rgba(0,229,255,.08),transparent 60%),#0A0A0F}
body::after{content:"";position:fixed;inset:0;z-index:-1;opacity:.03;background-image:linear-gradient(rgba(255,255,255,.1)1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.1)1px,transparent 1px);background-size:44px 44px}
nav{display:flex;align-items:center;padding:12px 24px;background:rgba(5,5,12,.7);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,42,42,.25);gap:1.4rem;position:sticky;top:0;z-index:50}
.nav-logo{font-family:'Bebas Neue';font-size:1.35rem;letter-spacing:4px;background:linear-gradient(135deg,var(--red),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.nav-link{color:#AAA;text-decoration:none;font-size:.9rem;letter-spacing:2px;text-transform:uppercase;transition:.2s}
.nav-link:hover,.nav-link.active{color:var(--gold);text-shadow:0 0 12px rgba(255,215,0,.4)}
#flag-container{display:flex;gap:6px}
.flag-btn{width:24px;height:16px;border:1px solid rgba(255,255,255,.2);border-radius:3px;cursor:pointer;opacity:.6;background-size:cover;transition:.2s}
.flag-btn:hover,.flag-btn.flag-active{opacity:1;border-color:var(--gold);box-shadow:0 0 8px rgba(255,215,0,.4)}
.flag-pt{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23009b3a"/><polygon points="1.5,0.2 2.7,1 1.5,1.8 0.3,1" fill="%23ffdf00"/><circle cx="1.5" cy="1" r="0.35" fill="%23002776"/></svg>')}
.flag-us{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23b22234"/><g fill="%23fff"><rect y="0.15" width="3" height="0.15"/><rect y="0.45" width="3" height="0.15"/><rect y="0.75" width="3" height="0.15"/><rect y="1.05" width="3" height="0.15"/><rect y="1.35" width="3" height="0.15"/><rect y="1.65" width="3" height="0.15"/></g><rect width="1.2" height="1.05" fill="%233c3b6e"/></svg>')}
.flag-es{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23c60b1e"/><rect y="0.5" width="3" height="1" fill="%23ffc400"/></svg>')}
.hero{text-align:center;padding:50px 20px 30px}
.hero h1{font-family:'Bebas Neue';font-size:4rem;letter-spacing:6px;background:linear-gradient(135deg,var(--red),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 20px rgba(255,42,42,.2))}
.hero p{color:#666;letter-spacing:2px;text-transform:uppercase;font-size:.85rem}
.podium{display:flex;justify-content:center;align-items:flex-end;gap:40px;margin:40px auto;max-width:900px}
.pod{text-align:center;transition:.3s}
.pod:hover{transform:translateY(-5px)}
.pod-rank{font-family:'Bebas Neue';font-size:3.5rem;color:var(--gold);margin-bottom:12px;text-shadow:0 0 20px rgba(255,215,0,.3)}
.pod-avatar{width:160px;height:160px;margin:0 auto 15px;border-radius:50%;border:4px solid var(--gold);overflow:hidden;box-shadow:0 0 40px rgba(255,215,0,.5);background:#000}
.pod-avatar img{width:110%;height:110%;object-fit:cover;object-position:50% 5%;margin-top:-5%}
.pod-name{font-family:'Bebas Neue';font-size:1.7rem;color:var(--gold);letter-spacing:2px}
.pod-time{color:var(--acc);font-size:1.4rem;font-weight:700;margin-top:4px}
.pod-wallet{font-size:.75rem;color:#555;margin-top:4px}
.pod-1{transform:scale(1.15);order:2}
.pod-2{order:1}
.pod-3{order:3}
.board{max-width:820px;margin:60px auto 120px;padding:0 20px}
.row{grid-template-columns:60px 1fr 120px 70px;align-items:center;padding:18px 22px;background:rgba(255,255,255,.03);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:14px;margin-bottom:12px;transition:.2s}
.row:hover{background:rgba(255,255,255,.05);border-color:rgba(255,215,0,.2);transform:translateX(4px)}
.pos{font-family:'Bebas Neue';font-size:1.5rem;color:#666;text-align:center}
.pos.top3{color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,.5)}
.player{display:flex;align-items:center;gap:14px}
.p-avatar{width:44px;height:44px;border-radius:50%;overflow:hidden;background:#000;flex-shrink:0;border:2px solid rgba(255,255,255,.1)}
.p-avatar img{width:110%;height:110%;object-fit:cover;object-position:50% 5%;margin-top:-5%}
.p-name{font-weight:700}
.p-wallet{font-size:.75rem;color:#666}
.time{font-family:'Bebas Neue';font-size:1.4rem;color:var(--acc);text-align:right}
.launches{color:#888;text-align:center}
.login-btn{
  background:linear-gradient(135deg,var(--red),var(--gold));
  border:none;
  padding:8px 16px;
  border-radius:20px;
  font-family:'Bebas Neue';
  letter-spacing:2px;
  color:#000;
  font-size:.9rem;
  transition:.2s;
  cursor:pointer;
}
.login-btn:hover{
  filter:brightness(1.2);
  transform:scale(1.05);
}
.nav-right{
  display:flex;
  align-items:center;
  gap:10px;
  margin-left:auto;
}
.center{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}
.hero,
.podium,
.board {
  position: relative;
  z-index: 2;
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">CAP RUSH</a>
  <a href="caprush-game.html" class="nav-link" data-i18n="play">JOGAR</a>
  <a href="personagens.html" class="nav-link" data-i18n="pilots">PILOTOS</a>
  <a href="ranking.html" class="nav-link active" data-i18n="ranking">RANKING</a>
  <a href="manual.html" class="nav-link" data-i18n="manual">MANUAL</a>
  <div class="nav-right">

    <button id="soundBtn" onclick="toggleAudio()" class="login-btn" style="
      padding:0;
      width:38px;
      height:38px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
    ">🔇</button>

    <div id="flag-container">
      <button class="flag-btn flag-pt" onclick="setLang('pt')"></button>
      <button class="flag-btn flag-us" onclick="setLang('en')"></button>
      <button class="flag-btn flag-es" onclick="setLang('es')"></button>
    </div>
  </div>
</nav>
<div class="hero"><h1 data-i18n="rank-title">RANKING GLOBAL T1</h1><p data-i18n="rank-season">TEMPORADA ATUAL</p></div>
<div style="display:flex;justify-content:center;gap:12px;margin:20px 0 -10px;">
  <button class="mode-tab active" data-mode="solo" onclick="switchMode('solo')" style="font-family:'Bebas Neue';font-size:.9rem;letter-spacing:2px;padding:6px 20px;background:rgba(255,42,42,.15);border:1px solid rgba(255,42,42,.4);color:#FF2A2A;border-radius:20px;cursor:pointer;transition:.2s;">SOLO</button>
  <button class="mode-tab" data-mode="local" onclick="switchMode('local')" style="font-family:'Bebas Neue';font-size:.9rem;letter-spacing:2px;padding:6px 20px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);color:#00E5FF;border-radius:20px;cursor:pointer;transition:.2s;">1v1 LOCAL</button>
  <button class="mode-tab" data-mode="online" onclick="switchMode('online')" style="font-family:'Bebas Neue';font-size:.9rem;letter-spacing:2px;padding:6px 20px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);color:#FFD700;border-radius:20px;cursor:pointer;transition:.2s;">ONLINE</button>
</div>
<style>.mode-tab.active{background:rgba(255,42,42,.35)!important;border-color:var(--red)!important;box-shadow:0 0 14px rgba(255,42,42,.3);}</style>
<div class="podium" id="podium"></div>
<div class="board" id="board"><div style="text-align:center;color:#555;padding:40px">Carregando...</div></div>
<script src="/i18n.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const supabase = createClient('https://rigghudagbzrzadsbeml.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpZ2dodWRhZ2J6cnphZHNiZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzk4OTUsImV4cCI6MjA5MTk1NTg5NX0.2fXODjCXc7IjsF7KS5cAMC-jt9ovxturuQUKmiApO9A');

const imgs={YUKI:'client/public/assets/images/yuki-piloto.png',KENTA:'client/public/assets/images/kenta-piloto.png',BRUNA:'client/public/assets/images/bruna-piloto.png',TAPZ:'client/public/assets/images/tapz-piloto.png'};
function getDisplayName(r){ return r.nickname || r.wallet || 'ANON'; }
function fmt(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60);return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}.${String(Math.floor((ms%1000)/10)).padStart(2,'0')}`}

// Mode tab state
var currentMode='solo';
function switchMode(m){
  currentMode=m;
  document.querySelectorAll('.mode-tab').forEach(function(el){
    el.classList.toggle('active',el.dataset.mode===m);
  });
  load();
}

async function load(){
  const { data } = await supabase.from('runs').select('*').eq('mode',currentMode).order('time_ms',{ascending:true}).limit(50);
  if(!data || data.length===0){document.getElementById('board').innerHTML='<div style="text-align:center;color:#555;padding:60px">Nenhuma corrida ainda. Jogue para aparecer!</div>';return}

  const top3 = data.slice(0,3);
  document.getElementById('podium').innerHTML = [1,0,2].map(i=>{const r=top3[i];if(!r)return'';return `<div class="pod pod-${i+1}"><div class="pod-rank">${i+1}</div><div class="pod-avatar"><img src="${imgs[r.pilot]||imgs.YUKI}"></div><div class="pod-name">${getDisplayName(r)}</div><div class="pod-time">${fmt(r.time_ms)}</div><div class="pod-wallet" style="font-size:.8rem;color:#888;margin-top:2px">${r.mode||'solo'}</div></div>`}).join('');

  document.getElementById('board').innerHTML = data.map((r,i)=>`<div class="row"><div class="pos ${i<3?'top3':''}">${i+1}</div><div class="player"><div class="p-avatar"><img src="${imgs[r.pilot]||imgs.YUKI}"></div><div class="p-name">${getDisplayName(r)}</div><div class="p-wallet" style="color:#888;font-size:.7rem">${r.pilot}</div></div><div class="time">${fmt(r.time_ms)}</div><div class="launches">${r.launches}</div></div>`).join('');
}
load();
</script>
<script>
window.addEventListener("pageshow", () => {
  document.body.style.transform = "scale(1)";
  document.body.style.opacity = "1";
});
</script>
<script src="audio.js"></script>
<script src="background.js"></script>
</body>
</html>
