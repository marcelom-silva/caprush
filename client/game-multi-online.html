<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CapRush – Online 1v1</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
:root{--red:#FF2A2A;--gold:#FFD700;--dark:#0A0A0F;--panel:rgba(8,8,18,.96);--acc:#00E5FF;--p2:#FF9900;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{width:100%;height:100%;background:var(--dark);font-family:'Rajdhani',sans-serif;color:#E8E8F0;overflow:hidden;}
#shell{display:flex;flex-direction:column;width:100%;height:100%;}
#hud{display:flex;justify-content:space-between;align-items:center;padding:5px 14px;background:var(--panel);border-bottom:2px solid rgba(255,42,42,.3);flex-shrink:0;height:44px;gap:1rem;}
.hlogo{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:3px;background:linear-gradient(135deg,var(--red),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;white-space:nowrap;}
.pi{display:flex;align-items:center;gap:.5rem;}.pd{width:11px;height:11px;border-radius:50%;flex-shrink:0;}.pn{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:2px;}.ps{font-family:'Bebas Neue',sans-serif;font-size:.8rem;color:#888;min-width:54px;}.vs{font-family:'Bebas Neue',sans-serif;color:#333;font-size:1.3rem;letter-spacing:3px;}
#wrap{position:relative;flex:1;min-height:0;display:flex;}#gameCanvas{display:block;flex:1;cursor:crosshair;}
#panel{width:155px;flex-shrink:0;background:var(--panel);border-left:1px solid rgba(255,42,42,.2);display:flex;flex-direction:column;padding:9px;gap:9px;overflow:hidden;}
.pt{font-family:'Bebas Neue',sans-serif;font-size:.88rem;letter-spacing:2px;color:var(--red);border-bottom:1px solid rgba(255,42,42,.25);padding-bottom:3px;display:flex;justify-content:space-between;align-items:center;}
.audio-btns{display:flex;gap:5px;}.audio-btn{background:rgba(255,42,42,.1);border:1px solid rgba(255,42,42,.3);color:#888;border-radius:3px;font-size:.8rem;padding:1px 5px;cursor:pointer;transition:all .2s;line-height:1;}.audio-btn:hover{background:rgba(255,42,42,.25);color:#ccc;}.audio-btn.off{opacity:.35;color:#555;}
#fbg{width:100%;height:90px;background:#1A1A28;border:1px solid #333;border-radius:4px;position:relative;overflow:hidden;}#force-bar-fill{position:absolute;bottom:0;left:0;right:0;height:0%;background:linear-gradient(0deg,var(--red),var(--gold));transition:height .05s;}#flbl{font-size:.65rem;color:#666680;letter-spacing:1px;text-transform:uppercase;text-align:center;}#force-value{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--gold);text-align:center;}
#log-box{flex:1;overflow-y:auto;font-size:.6rem;color:#555570;}#log-box p{padding:2px 0;border-bottom:1px solid #1A1A28;}#log-box p.ev{color:var(--gold);}
#surf-legend{font-size:.6rem;color:#666680;margin-top:2px;}.sl-row{display:flex;align-items:center;gap:4px;margin:2px 0;}.sl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
#mp-turn{font-size:.65rem;letter-spacing:1px;text-transform:uppercase;color:#888;text-align:center;margin-top:2px;}#mp-p1-info,#mp-p2-info{padding:4px 0;border-bottom:1px solid #1A1A28;font-size:.65rem;}
#overlay{position:absolute;left:0;top:0;right:155px;bottom:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;gap:.7rem;text-align:center;}#overlay h2{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:5px;color:var(--gold);margin-bottom:.3rem;}#overlay p{color:#AAA;letter-spacing:1px;font-size:.85rem;}#overlay input{width:220px;padding:8px 10px;background:#111;border:1px solid #333;border-radius:4px;color:#eee;font-family:'Rajdhani';text-align:center;}#overlay button{padding:8px 14px;background:var(--red);border:1px solid var(--red);color:#fff;border-radius:4px;font-family:'Rajdhani';font-weight:700;cursor:pointer;letter-spacing:1px;}#overlay button:hover{filter:brightness(1.2);}
#btnBack{position:absolute;top:8px;left:8px;z-index:25;background:rgba(255,42,42,.15);border:1px solid var(--red);color:var(--red);font-family:'Rajdhani',sans-serif;font-size:.73rem;letter-spacing:2px;padding:3px 8px;cursor:pointer;border-radius:3px;text-decoration:none;}#btnBack:hover{background:var(--red);color:#fff;}
</style>
</head>
<body>
<div id="shell">
  <div id="hud">
    <a href="../index.html" class="hlogo">CAP RUSH ONLINE</a>
    <div class="pi"><div class="pd" style="background:var(--acc);box-shadow:0 0 7px var(--acc)"></div><span class="pn" style="color:var(--acc)">YUKI</span><span class="ps" id="p0-time">00:00.0</span><span class="ps" id="p0-lap" style="color:var(--acc)">V1/2 CP0/3</span></div>
    <span class="vs">VS</span>
    <div class="pi"><span class="ps" id="p1-lap" style="color:var(--p2)">V1/2 CP0/3</span><span class="ps" id="p1-time">00:00.0</span><span class="pn" style="color:var(--p2)">KENTA</span><div class="pd" style="background:var(--p2);box-shadow:0 0 7px var(--p2)"></div></div>
  </div>
  <div id="wrap">
    <canvas id="gameCanvas"></canvas>
    <div id="panel">
      <div class="pt"><span>CONEXAO</span><div class="audio-btns"><button class="audio-btn" id="btn-bgm" onclick="toggleBGM()" title="Musica">&#9836;</button><button class="audio-btn" id="btn-sfx" onclick="toggleSFX()" title="Efeitos">&#9654;&#9654;</button></div></div>
      <div id="mp-turn">DESCONECTADO</div>
      <div class="pt" style="margin-top:4px">FORCA</div><div id="flbl">Potencia</div><div id="fbg"><div id="force-bar-fill"></div></div><div id="force-value">0%</div>
      <div class="pt">PLACAR</div><div id="mp-p1-info" style="color:var(--acc)">YUKI: V1 CP0</div><div id="mp-p2-info" style="color:var(--p2)">KENTA: V1 CP0</div>
      <div class="pt">PISTA</div><div id="surf-legend"><div class="sl-row"><div class="sl-dot" style="background:#5C4530;"></div><span>Asfalto</span></div><div class="sl-row"><div class="sl-dot" style="background:#00A0FF;border:1px solid #00E5FF;"></div><span>Agua</span></div><div class="sl-row"><div class="sl-dot" style="background:#38B838;border:1px solid #60E060;"></div><span>Grama</span></div></div>
      <div class="pt">EVENTOS</div><div id="log-box"></div>
    </div>
    <div id="overlay">
      <h2>1V1 ONLINE</h2>
      <p id="ov-status">Crie uma sala ou entre com ID</p>
      <button id="btnHost">CRIAR SALA</button>
      <div style="display:flex;gap:6px;margin-top:4px"><input id="roomId" placeholder="ID da sala"/><button id="btnJoin">ENTRAR</button></div>
      <p style="font-size:.7rem;color:#666;margin-top:.5rem">Use duas janelas no localhost para testar</p>
    </div>
    <a href="game-multi.html" id="btnBack">&larr; MODOS</a>
  </div>
</div>
<script src="src/core/Vector2D.js"></script>
<script src="src/core/SoundEngine.js"></script>
<script src="src/core/CapSprite.js"></script>
<script src="src/scenes/TrackV3.js"></script>
<script>
function toggleBGM(){var on=SoundEngine.toggleBGM();document.getElementById('btn-bgm').classList.toggle('off',!on);}
function toggleSFX(){var on=SoundEngine.toggleSFX();document.getElementById('btn-sfx').classList.toggle('off',!on);}
function logEv(m){var b=document.getElementById('log-box');var p=document.createElement('p');p.className='ev';p.textContent=m;b.insertBefore(p,b.firstChild);if(b.children.length>14)b.removeChild(b.lastChild);}
function updPanel(){document.getElementById('mp-p1-info').textContent='YUKI: V'+P[0].lap+' CP'+P[0].cp;document.getElementById('mp-p2-info').textContent='KENTA: V'+P[1].lap+' CP'+P[1].cp;}
function makePhysics(){var BASE=1.8,MAX=165,SPD=620,REST=0.72,MIN=6,DR={asfalto:1,agua:1.95,grama:0.42};var s={p:new Vector2D(0,0),v:new Vector2D(0,0),m:false,sf:'asfalto'};return{reset:function(x,y,f){s.p=new Vector2D(x,y);s.v=new Vector2D(0,0);s.m=false;s.sf=f||'asfalto'},setSurface:function(f){s.sf=f||'asfalto'},setVel:function(x,y){s.v=new Vector2D(x,y);s.m=s.v.magnitude()>MIN},flick:function(a,b,mult){var d=a.sub(b),l=Math.min(d.magnitude(),MAX),t=l/MAX;s.v=d.normalize().scale(t*SPD*(mult||1));s.m=true;var pct=Math.round(t*100);document.getElementById('force-value').textContent=pct+'%';document.getElementById('force-bar-fill').style.height=pct+'%';return pct},bounce:function(nx,ny){if(nx==null||ny==null)return;var d=s.v.x*nx+s.v.y*ny;if(d>=0)return;s.v.x=(s.v.x-2*d*nx)*REST;s.v.y=(s.v.y-2*d*ny)*REST;s.m=s.v.magnitude()>MIN},step:function(dt,b){if(!s.m)return this.snap();var drag=BASE*(DR[s.sf]||1),sp=s.v.magnitude(),ns=Math.max(0,sp-drag*sp*dt);if(ns<MIN){s.v=new Vector2D(0,0);s.m=false;return this.snap()}s.v=s.v.normalize().scale(ns);s.p=s.p.add(s.v.scale(dt));if(s.m&&window.SoundEngine)SoundEngine.drag(s.sf,sp);var r=14;if(s.p.x-r<b.x){s.p.x=b.x+r;s.v.x=Math.abs(s.v.x)*REST}if(s.p.x+r>b.x+b.w){s.p.x=b.x+b.w-r;s.v.x=-Math.abs(s.v.x)*REST}if(s.p.y-r<b.y){s.p.y=b.y+r;s.v.y=Math.abs(s.v.y)*REST}if(s.p.y+r>b.y+b.h){s.p.y=b.y+b.h-r;s.v.y=-Math.abs(s.v.y)*REST}return this.snap()},snap:function(){return{pos:s.p.clone(),vel:s.v.clone(),speed:s.v.magnitude(),moving:s.m}},get pos(){return s.p.clone()}}}
function cloneCPs(m){return m.map(function(c){return{x:c.x,y:c.y,r:c.r,lbl:c.lbl,ok:false}})}
SoundEngine.init();var canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),overlay=document.getElementById('overlay');var LAPS=2,NCPS=3,CAP_R=16;
var P=[{id:0,name:'YUKI',color:'#00E5FF',accent:'#00A5C8',kanji:'雪',phys:makePhysics(),cps:null,lap:1,cp:0,t0:0,elapsed:0,finished:false,respawn:null,anim:{rot:0,glow:0,gdir:1,trail:[]}},{id:1,name:'KENTA',color:'#FF9900',accent:'#CC7700',kanji:'魔',phys:makePhysics(),cps:null,lap:1,cp:0,t0:0,elapsed:0,finished:false,respawn:null,anim:{rot:0,glow:0,gdir:1,trail:[]}}];
var myId=0,peer=null,conn=null,phase='WAIT',cur=0,ds=null,dc=null,lt=0,animT=0,sndT={water:0,grass:0};
function resize(){var w=canvas.parentElement;canvas.width=w.offsetWidth-155;canvas.height=w.offsetHeight||400;TrackV3.init(canvas.width,canvas.height);var s=TrackV3.getStartPos();P.forEach(function(p,i){var o=i===0?-14:14;p.phys.reset(s.x,s.y+o,'asfalto');p.respawn={x:s.x,y:s.y+o};p.cps=cloneCPs(TrackV3.checkpoints)})}
window.addEventListener('resize',resize);setTimeout(resize,80);
function setStatus(t){document.getElementById('mp-turn').textContent=t;document.getElementById('ov-status').textContent=t;logEv(t)}
document.getElementById('btnHost').onclick=function(){setStatus('Conectando PeerServer...');peer=new Peer({debug:2});peer.on('open',function(id){setStatus('SALA: '+id);myId=0;cur=0;logEv('Host pronto');startGame()});peer.on('error',function(e){setStatus('ERRO: '+e.type);logEv('Host erro '+e.type)});peer.on('connection',function(c){conn=c;setupConn();logEv('Guest conectou')})};
document.getElementById('btnJoin').onclick=function(){var id=document.getElementById('roomId').value.trim();if(!id){setStatus('Digite ID');return}setStatus('Conectando...');peer=new Peer({debug:2});peer.on('open',function(){conn=peer.connect(id,{reliable:true});conn.on('open',function(){myId=1;cur=0;setStatus('CONECTADO');logEv('Entrou na sala');setupConn();startGame()});conn.on('error',function(e){setStatus('Erro conn');logEv('Conn erro')})});peer.on('error',function(e){setStatus('ERRO: '+e.type);logEv('Join erro '+e.type)})};
function setupConn(){conn.on('data',function(d){if(d.t==='flick'){var p=P[d.p];p.phys.flick(new Vector2D(d.fx,d.fy),new Vector2D(d.tx,d.ty),1);if(!p.t0)p.t0=performance.now()}});conn.on('close',function(){setStatus('Desconectado')})}
function startGame(){overlay.style.display='none';SoundEngine.resume();SoundEngine.startBGM();phase='AIM';if(!P[myId].t0)P[myId].t0=performance.now();showTurn();requestAnimationFrame(function(t){lt=t;loop(t)})}
function showTurn(){var p=P[cur];updPanel()}
function cpos(e){var r=canvas.getBoundingClientRect();var pt=e.touches?e.touches[0]:e;return new Vector2D(pt.clientX-r.left,pt.clientY-r.top)}
function bnd(){return{x:0,y:0,w:canvas.width,h:canvas.height}}
function nearActive(pt){return pt.distanceTo(P[myId].phys.snap().pos)<52}
canvas.addEventListener('mousedown',function(e){if(phase!=='AIM'||myId!==cur)return;if(nearActive(cpos(e))){ds=cpos(e);dc=cpos(e)}});
canvas.addEventListener('mousemove',function(e){if(ds)dc=cpos(e)});
canvas.addEventListener('mouseup',function(e){if(!ds||myId!==cur)return;doFlick(cpos(e))});
canvas.addEventListener('touchstart',function(e){if(phase!=='AIM'||myId!==cur)return;if(nearActive(cpos(e))){ds=cpos(e);dc=cpos(e)}},{passive:true});
canvas.addEventListener('touchmove',function(e){if(ds)dc=cpos(e.touches[0])},{passive:false});
canvas.addEventListener('touchend',function(e){if(!ds||myId!==cur)return;doFlick(cpos({touches:e.changedTouches}))});
function doFlick(to){var p=P[myId];p.phys.flick(ds,to,1);if(!p.t0)p.t0=performance.now();if(conn&&conn.open)conn.send({t:'flick',p:myId,fx:ds.x,fy:ds.y,tx:to.x,ty:to.y});ds=null;dc=null;phase='MOVING'}
function loop(now){var dt=Math.min((now-lt)/1000,.05);lt=now;animT+=dt;ctx.clearRect(0,0,canvas.width,canvas.height);TrackV3.render(ctx,canvas.width,canvas.height,animT);if(phase==='MOVING'){P[0].phys.step(dt,bnd());P[1].phys.step(dt,bnd());var a=P[0],b=P[1],pa=a.phys.snap(),pb=b.phys.snap(),d=Math.hypot(pb.pos.x-pa.pos.x,pb.pos.y-pa.pos.y);if(d<28&&d>0.1){var nx=(pb.pos.x-pa.pos.x)/d,ny=(pb.pos.y-pa.pos.y)/d,va=(pb.vel.x-pa.vel.x)*nx+(pb.vel.y-pa.vel.y)*ny;if(va<0){var j=-(1.72)*va/2;a.phys.setVel(pa.vel.x-j*nx,pa.vel.y-j*ny);b.phys.setVel(pb.vel.x+j*nx,pb.vel.y+j*ny);SoundEngine.hit()}}P.forEach(function(p){var ph=p.phys.snap();var o=TrackV3.checkObstacles(ph.pos,CAP_R);if(o&&o.nx!=null){p.phys.bounce(o.nx,o.ny);SoundEngine.hit()}if(TrackV3.isOnTrack(ph.pos)){var t=Date.now();if(TrackV3.detectPuddle(ph.pos)){p.phys.setSurface('agua');if(t-sndT.water>700){SoundEngine.splash();sndT.water=t}}else if(TrackV3.detectGrassOnTrack(ph.pos)){p.phys.setSurface('grama');if(t-sndT.grass>900){SoundEngine.grass();sndT.grass=t}}else p.phys.setSurface('asfalto')}else if(TrackV3.detectInner(ph.pos)){var rp=p.respawn||TrackV3.getStartPos();p.phys.reset(rp.x,rp.y,'asfalto')}for(var i=0;i<p.cps.length;i++){var c=p.cps[i];if(c.ok)continue;if(Math.hypot(ph.pos.x-c.x,ph.pos.y-c.y)<c.r){c.ok=true;p.cp++;p.respawn={x:c.x,y:c.y};SoundEngine.checkpoint();logEv(p.name+' CP'+p.cp);updPanel()}}if(p.cp>=NCPS&&TrackV3.checkLap(ph.pos)){p.cp=0;p.cps=cloneCPs(TrackV3.checkpoints);if(p.lap>=LAPS){p.finished=true;p.elapsed=(performance.now()-p.t0)/1000;SoundEngine.victory();logEv(p.name+' VENCEU')}else{p.lap++;logEv(p.name+' V'+p.lap);updPanel()}}if(p.t0)p.elapsed=(performance.now()-p.t0)/1000;document.getElementById('p'+p.id+'-time').textContent=((p.elapsed/60|0).toString().padStart(2,'0'))+':'+((p.elapsed%60).toFixed(1).padStart(4,'0'));document.getElementById('p'+p.id+'-lap').textContent='V'+p.lap+'/'+LAPS+' CP'+p.cp+'/'+NCPS});var stop=!P[0].phys.snap().moving&&!P[1].phys.snap().moving;if(stop){phase='AIM';cur=1-cur;document.getElementById('mp-turn').textContent='VEZ DE '+P[cur].name;document.getElementById('force-value').textContent='0%';document.getElementById('force-bar-fill').style.height='0%'}}P.forEach(function(p){var ph=p.phys.snap(),s=ph.speed;p.anim.rot+=s*dt*.006;p.anim.glow+=.03*p.anim.gdir;if(p.anim.glow>=1||p.anim.glow<=0)p.anim.gdir*=-1;p.anim.trail.push({x:ph.pos.x,y:ph.pos.y});if(p.anim.trail.length>20)p.anim.trail.shift();CapSprite.drawTrail(ctx,p.anim.trail,p.color,s);CapSprite.drawCap(ctx,ph.pos.x,ph.pos.y,16,p.color,p.accent,p.kanji,p.anim.rot,s,p.anim.glow)});requestAnimationFrame(loop)}
// Portal auto
if(new URLSearchParams(location.search).get('portal')==='true'){document.getElementById('overlay').querySelector('h2').textContent='PORTAL ATIVO';}
setTimeout(()=>{const h=document.getElementById('hud');if(h){const a=document.createElement('a');a.href='https://vibej.am/portal/2026?ref='+encodeURIComponent(location.host);a.textContent='PORTAL';a.style='margin-left:8px;font-family:Bebas Neue;color:#FFD700;font-size:.75rem;border:1px solid #FFD700;padding:2px 6px;border-radius:3px;text-decoration:none';h.appendChild(a)}},500)
</script>
</body>
