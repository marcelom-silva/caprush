<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapRush – Personagens</title>
<style>
:root{
  --or:#FF5500;--or2:#FF8C00;--cy:#00EEFF;--cy2:#0055FF;
  --gd:#FFD700;--dk:#020110;--dk2:#080818;--dk3:#0d0d28;
  --wh:#FFFFFF;--mu:#1e3055;--mu2:#2a3f60;
  --display:"Impact","Arial Black",Arial,sans-serif;
  --mono:"Courier New",Courier,monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--dk);color:var(--wh);font-family:var(--mono);overflow:hidden}

/* ── BG GRID ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:
    repeating-linear-gradient(-22deg,transparent,transparent 43px,rgba(255,85,0,.015) 43px,rgba(255,85,0,.015) 44px);
}

/* ── ANIMATIONS ── */
@keyframes slideL{from{transform:translateX(-60px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideR{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeU{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes statFill{from{width:0}to{width:var(--w)}}
@keyframes scanV{from{transform:translateY(-100%)}to{transform:translateY(100vh)}}
@keyframes capSpin{from{transform:rotate(0)}to{transform:rotate(-360deg)}}
@keyframes glitch{
  0%,95%,100%{transform:translate(0)}
  96%{transform:translate(-3px,1px)}
  97%{transform:translate(3px,-1px)}
  98%{transform:translate(-2px,0)}
}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;background:rgba(2,1,16,.95);
  border-bottom:1px solid rgba(255,85,0,.15);backdrop-filter:blur(8px);
}
.nav-logo{font-family:var(--display);font-size:20px;letter-spacing:-1px;text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-logo .cap{color:#fff}.nav-logo .rush{color:var(--or)}
.nav-back{font-size:10px;letter-spacing:2px;color:var(--mu2);text-decoration:none;transition:color .2s;display:flex;align-items:center;gap:6px}
.nav-back:hover{color:var(--or)}
.nav-status{font-size:9px;letter-spacing:3px;color:var(--mu);display:flex;align-items:center;gap:16px}
.status-dot{width:6px;height:6px;border-radius:50%;background:rgba(68,255,136,.7);animation:pulse 2s infinite}

/* ── LAYOUT SPLIT ── */
.stage{
  position:fixed;inset:52px 0 0 0;
  display:grid;grid-template-columns:320px 1fr 360px;
}

/* ── LEFT: ROSTER ── */
.roster{
  background:var(--dk2);
  border-right:1px solid rgba(255,85,0,.1);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.roster-header{
  padding:24px 28px 16px;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.roster-label{font-size:9px;letter-spacing:4px;color:var(--mu);margin-bottom:8px}
.roster-title{font-family:var(--display);font-size:22px;letter-spacing:-1px;color:var(--wh)}

.char-list{flex:1;overflow-y:auto;padding:8px 0}
.char-list::-webkit-scrollbar{width:2px}
.char-list::-webkit-scrollbar-thumb{background:rgba(255,85,0,.3)}

.char-item{
  display:flex;align-items:center;gap:16px;
  padding:16px 28px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .2s,border-color .2s;
  position:relative;
}
.char-item:hover,.char-item.active{background:rgba(255,85,0,.06)}
.char-item.active{border-left-color:var(--or)}
.char-item.locked{opacity:.35;cursor:not-allowed}
.char-item.locked:hover{background:transparent;border-left-color:transparent}

.char-thumb{
  width:52px;height:52px;border-radius:2px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;position:relative;overflow:hidden;
}
.char-thumb::after{
  content:'';position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.08);
}
.char-info{flex:1;min-width:0}
.char-name{font-family:var(--display);font-size:18px;letter-spacing:-1px;display:block;margin-bottom:3px}
.char-role{font-size:9px;letter-spacing:2.5px;color:var(--mu2)}
.char-lock{position:absolute;right:20px;font-size:11px;color:var(--mu)}

.roster-footer{
  padding:16px 28px;
  border-top:1px solid rgba(255,255,255,.04);
}
.roster-footer-label{font-size:9px;letter-spacing:2px;color:var(--mu);margin-bottom:6px}
.cr-balance{font-family:var(--display);font-size:22px;letter-spacing:-1px;color:var(--gd)}

/* ── CENTER: ARENA ── */
.arena{
  background:var(--dk);position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

.arena-scan{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,85,0,.2),transparent);
  animation:scanV 4s linear infinite;pointer-events:none;
}
.arena-corner{position:absolute;width:24px;height:24px}
.arena-corner.tl{top:20px;left:20px;border-top:2px solid rgba(255,85,0,.4);border-left:2px solid rgba(255,85,0,.4)}
.arena-corner.tr{top:20px;right:20px;border-top:2px solid rgba(255,85,0,.4);border-right:2px solid rgba(255,85,0,.4)}
.arena-corner.bl{bottom:80px;left:20px;border-bottom:2px solid rgba(0,238,255,.3);border-left:2px solid rgba(0,238,255,.3)}
.arena-corner.br{bottom:80px;right:20px;border-bottom:2px solid rgba(0,238,255,.3);border-right:2px solid rgba(0,238,255,.3)}

.char-display{
  position:relative;z-index:2;text-align:center;
  transition:opacity .3s,transform .3s;
}
.char-avatar{
  width:280px;height:340px;margin:0 auto;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.char-avatar-canvas{width:100%;height:100%}
.char-avatar-emoji{
  font-size:160px;line-height:1;
  filter:drop-shadow(0 0 40px var(--char-color,rgba(255,85,0,.5)));
  animation:glitch 8s ease infinite;
}
.char-glow{
  position:absolute;inset:-40px;border-radius:50%;
  background:radial-gradient(ellipse at center,var(--char-color,rgba(255,85,0,.15)) 0%,transparent 70%);
  pointer-events:none;
}
.arena-name{
  font-family:var(--display);font-size:52px;letter-spacing:-3px;
  line-height:1;margin-top:16px;
  color:var(--char-color,var(--or));
  animation:glitch 12s ease infinite 3s;
}
.arena-epithet{
  font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.3);
  margin-top:6px;text-transform:uppercase;
}

.arena-select-btn{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--char-color,var(--or));color:#fff;border:none;
  padding:14px 36px;font-family:var(--mono);font-size:13px;
  letter-spacing:2px;text-transform:uppercase;
  margin-top:28px;cursor:pointer;border-radius:1px;
  text-decoration:none;transition:opacity .2s,transform .15s;
}
.arena-select-btn:hover{opacity:.85;transform:translateY(-2px)}
.arena-select-btn.locked-btn{
  background:rgba(255,255,255,.05);color:var(--mu2);
  border:1px solid rgba(255,255,255,.08);cursor:not-allowed;
}
.arena-select-btn.locked-btn:hover{transform:none;opacity:1}

/* ── RIGHT: STATS ── */
.stats-panel{
  background:var(--dk2);
  border-left:1px solid rgba(255,85,0,.1);
  overflow-y:auto;padding:28px;
  display:flex;flex-direction:column;gap:28px;
}
.stats-panel::-webkit-scrollbar{width:2px}
.stats-panel::-webkit-scrollbar-thumb{background:rgba(255,85,0,.3)}

.stat-block{display:flex;flex-direction:column;gap:12px}
.stat-block-title{font-size:9px;letter-spacing:4px;color:var(--mu);border-bottom:1px solid rgba(255,255,255,.04);padding-bottom:10px}

.stat-row{display:flex;flex-direction:column;gap:6px}
.stat-label-row{display:flex;justify-content:space-between;align-items:baseline}
.stat-name{font-size:11px;letter-spacing:1.5px;color:rgba(255,255,255,.6)}
.stat-value{font-family:var(--display);font-size:18px;letter-spacing:-1px;color:var(--or)}
.stat-bar-bg{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.stat-bar-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--bar-col,var(--or)),var(--bar-col2,var(--or2)));
  width:var(--w,0%);transition:width .8s cubic-bezier(.4,0,.2,1);
}

.cap-stat-block{display:flex;flex-direction:column;gap:10px}
.cap-info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.cap-info-key{font-size:10px;letter-spacing:1.5px;color:var(--mu2)}
.cap-info-val{font-size:12px;color:var(--wh);font-family:var(--mono)}
.cap-info-val.highlight{color:var(--gd);font-family:var(--display);font-size:16px;letter-spacing:-1px}

.lore-block{background:rgba(255,255,255,.02);border-left:2px solid rgba(255,85,0,.3);padding:14px 16px}
.lore-text{font-size:12px;color:rgba(255,255,255,.35);line-height:1.75}

.ability-list{display:flex;flex-direction:column;gap:8px}
.ability-card{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);
  padding:12px 14px;transition:border-color .2s;
}
.ability-card:hover{border-color:rgba(255,85,0,.3)}
.ability-name{font-size:11px;letter-spacing:1px;color:var(--wh);margin-bottom:4px}
.ability-desc{font-size:10px;color:var(--mu2);line-height:1.5}
.ability-tag{
  display:inline-block;margin-top:6px;padding:2px 8px;
  font-size:9px;letter-spacing:1.5px;
  background:rgba(255,85,0,.1);border:1px solid rgba(255,85,0,.2);color:var(--or);
}

/* ── MOBILE FALLBACK ── */
@media(max-width:900px){
  .stage{grid-template-columns:1fr;grid-template-rows:auto 1fr auto;overflow:auto}
  body,html{overflow:auto}
  .roster{border-right:none;border-bottom:1px solid rgba(255,85,0,.1);overflow:visible}
  .char-list{max-height:200px;overflow-y:auto}
  .arena{min-height:360px}
  .stats-panel{border-left:none;border-top:1px solid rgba(255,85,0,.1)}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><span class="cap">CAP</span><span class="rush">RUSH</span></a>
  <div class="nav-status">
    <div class="status-dot"></div>
    <span>DEVNET · FOGO SVM</span>
  </div>
  <a href="index.html" class="nav-back">← VOLTAR AO INÍCIO</a>
</nav>

<div class="stage">
  <!-- ── ROSTER ── -->
  <div class="roster">
    <div class="roster-header">
      <div class="roster-label">SELEÇÃO DE PILOTO</div>
      <div class="roster-title">Escolha seu<br>personagem</div>
    </div>
    <div class="char-list" id="charList"></div>
    <div class="roster-footer">
      <div class="roster-footer-label">SALDO DISPONÍVEL</div>
      <div class="cr-balance">🪙 $CR 840</div>
    </div>
  </div>

  <!-- ── ARENA ── -->
  <div class="arena">
    <div class="arena-scan"></div>
    <div class="arena-corner tl"></div>
    <div class="arena-corner tr"></div>
    <div class="arena-corner bl"></div>
    <div class="arena-corner br"></div>
    <div class="char-display" id="charDisplay"></div>
  </div>

  <!-- ── STATS ── -->
  <div class="stats-panel" id="statsPanel"></div>
</div>

<script>
const CHARS=[
  {
    id:'kaito',name:'KAITO',epithet:'O Relâmpago de Osaka',
    emoji:'⚡',color:'#FF5500',color2:'#FF8C00',
    locked:false,
    role:'ESPECIALISTA EM VELOCIDADE',
    bg:'rgba(255,85,0,.12)',
    stats:{velocidade:94,controle:61,aerodinamica:82,forca:73,resistencia:55},
    cap:{
      material:'Alumínio Polido',raridade:'ÉPICA',atributo:'+18% Velocidade Máx',
      preco:'—',token:'NFT #0001'
    },
    lore:'Ex-mecânico de Fórmula-E que descobriu o underground das tampinhas após perder sua licença numa corrida ilegal. Kaito não freia — ele só redireciona.',
    habilidades:[
      {nome:'TURBO BOOST',desc:'Dobra a potência do próximo lançamento. Cooldown: 2 voltas.',tag:'ATIVO'},
      {nome:'SLINGERS EYE',desc:'Mira sempre revela trajetória completa, mesmo sem arrastar.',tag:'PASSIVO'},
      {nome:'OVERDRIVE FINAL',desc:'Na última volta, velocidade base +30%. Sem custo.',tag:'ESPECIAL'},
    ]
  },
  {
    id:'yuki',name:'YUKI',epithet:'A Calculadora do Norte',
    emoji:'❄️',color:'#00CCFF',color2:'#0044FF',
    locked:false,
    role:'MESTRA DO CONTROLE',
    bg:'rgba(0,150,255,.1)',
    stats:{velocidade:65,controle:97,aerodinamica:79,forca:60,resistencia:88},
    cap:{
      material:'Titânio Azul',raridade:'LENDÁRIA',atributo:'+22% Controle de Curva',
      preco:'—',token:'NFT #0002'
    },
    lore:'Mestre em shogi antes de descobrir tampinhas. Para Yuki, cada pista é um tabuleiro e cada lançamento é três movimentos à frente. Nunca perde a calma.',
    habilidades:[
      {nome:'ÂNGULO PERFEITO',desc:'Uma vez por corrida, corrige automaticamente o ângulo de lançamento.',tag:'ATIVO'},
      {nome:'TRILHO DE GELO',desc:'Tampinha desliza com 40% menos atrito em curvas fechadas.',tag:'PASSIVO'},
      {nome:'ANÁLISE DE PISTA',desc:'Revela pontos de boost ocultos no início de cada volta.',tag:'ESPECIAL'},
    ]
  },
  {
    id:'ryu',name:'RYU',epithet:'O Filho da Estrada',
    emoji:'🔥',color:'#44FF88',color2:'#00BB55',
    locked:false,
    role:'PILOTO EQUILIBRADO',
    bg:'rgba(68,255,136,.08)',
    stats:{velocidade:78,controle:76,aerodinamica:75,forca:80,resistencia:82},
    cap:{
      material:'Aço Inoxidável',raridade:'RARA',atributo:'Stats Balanceados +10%',
      preco:'—',token:'NFT #0003'
    },
    lore:'Cresceu em Belém-PA assistindo tampinhas na rua. Sem escola técnica, sem academia — aprendeu tudo sozinho. Ryu é o wild card que ninguém vê vindo.',
    habilidades:[
      {nome:'TOQUE INSTINTIVO',desc:'Quando a força é máxima, ricochetes preservam 80% da velocidade.',tag:'ATIVO'},
      {nome:'ADAPTAÇÃO',desc:'A cada volta completada, todos os stats aumentam 3%.',tag:'PASSIVO'},
      {nome:'CORAÇÃO DE RUA',desc:'Nunca recebe penalidade de reset acima de +3 lançamentos.',tag:'ESPECIAL'},
    ]
  },
  {
    id:'neko',name:'NEKO',epithet:'A Caçadora Caótica',
    emoji:'🐈',color:'#CC44FF',color2:'#7700CC',
    locked:true,
    role:'ESPECIALISTA EM CAOS',
    bg:'rgba(150,50,255,.1)',
    stats:{velocidade:88,controle:44,aerodinamica:90,forca:95,resistencia:66},
    cap:{
      material:'Carbono Violeta',raridade:'MÍTICA',atributo:'+25% Força de Lançamento',
      preco:'2.400 $CR',token:'NFT #0004'
    },
    lore:'Identidade desconhecida. Apareceu no circuito há 60 dias com tampinha customizada e recorde em todas as pistas de alta dificuldade. Ninguém sabe de onde veio.',
    habilidades:[
      {nome:'CAOS TOTAL',desc:'Aleatoriza o atrito de toda a pista por 30 segundos. Afeta todos.',tag:'ATIVO'},
      {nome:'PRECISÃO FELINA',desc:'Mira em alta força é 2× mais precisa do que qualquer outro personagem.',tag:'PASSIVO'},
      {nome:'SHADOW RUN',desc:'Na primeira volta, tampinha é invisível para outros jogadores.',tag:'ESPECIAL'},
    ]
  },
];

let activeIdx=0;

function renderRoster(){
  const list=document.getElementById('charList');
  list.innerHTML='';
  CHARS.forEach((c,i)=>{
    const el=document.createElement('div');
    el.className='char-item'+(c.locked?' locked':'')+(i===activeIdx?' active':'');
    el.innerHTML=`
      <div class="char-thumb" style="background:${c.bg};font-size:26px">${c.emoji}</div>
      <div class="char-info">
        <span class="char-name" style="color:${c.color}">${c.name}</span>
        <span class="char-role">${c.role}</span>
      </div>
      ${c.locked?'<span class="char-lock">🔒</span>':''}
    `;
    if(!c.locked) el.addEventListener('click',()=>{activeIdx=i;renderAll()});
    list.appendChild(el);
  });
}

function renderArena(){
  const c=CHARS[activeIdx];
  const d=document.getElementById('charDisplay');
  d.style.opacity='0';d.style.transform='translateY(10px)';
  setTimeout(()=>{
    d.innerHTML=`
      <div class="char-avatar">
        <div class="char-glow" style="--char-color:${c.color}22"></div>
        <div class="char-avatar-emoji" style="--char-color:${c.color}44">${c.emoji}</div>
      </div>
      <div class="arena-name" style="--char-color:${c.color}">${c.name}</div>
      <div class="arena-epithet">${c.epithet}</div>
      ${c.locked
        ?`<button class="arena-select-btn locked-btn">🔒 DESBLOQUEIE POR ${c.cap.preco}</button>`
        :`<a href="caprush-game.html" class="arena-select-btn" style="background:${c.color}">▶ JOGAR COM ${c.name}</a>`
      }
    `;
    d.style.transition='opacity .35s ease,transform .35s ease';
    d.style.opacity='1';d.style.transform='translateY(0)';
  },120);
}

function renderStats(){
  const c=CHARS[activeIdx];
  const panel=document.getElementById('statsPanel');
  const statMeta=[
    {key:'velocidade',label:'VELOCIDADE',col:'#FF5500',col2:'#FF8C00'},
    {key:'controle',label:'CONTROLE',col:'#00CCFF',col2:'#0044FF'},
    {key:'aerodinamica',label:'AERODINÂMICA',col:'#44FF88',col2:'#00BB55'},
    {key:'forca',label:'FORÇA',col:'#FFD700',col2:'#FF8800'},
    {key:'resistencia',label:'RESISTÊNCIA',col:'#CC44FF',col2:'#7700CC'},
  ];
  panel.innerHTML=`
    <div class="stat-block">
      <div class="stat-block-title">ATRIBUTOS DO PILOTO</div>
      ${statMeta.map(s=>`
        <div class="stat-row">
          <div class="stat-label-row">
            <span class="stat-name">${s.label}</span>
            <span class="stat-value" style="color:${s.col}">${c.stats[s.key]}</span>
          </div>
          <div class="stat-bar-bg">
            <div class="stat-bar-fill" style="--w:${c.stats[s.key]}%;--bar-col:${s.col};--bar-col2:${s.col2};width:0%"></div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="cap-stat-block">
      <div class="stat-block-title">TAMPINHA NFT</div>
      <div class="cap-info-row"><span class="cap-info-key">MATERIAL</span><span class="cap-info-val">${c.cap.material}</span></div>
      <div class="cap-info-row"><span class="cap-info-key">RARIDADE</span><span class="cap-info-val" style="color:${c.color}">${c.cap.raridade}</span></div>
      <div class="cap-info-row"><span class="cap-info-key">ATRIBUTO</span><span class="cap-info-val" style="color:#44FF88">${c.cap.atributo}</span></div>
      <div class="cap-info-row"><span class="cap-info-key">TOKEN ID</span><span class="cap-info-val highlight">${c.cap.token}</span></div>
      ${c.locked?`<div class="cap-info-row"><span class="cap-info-key">PREÇO</span><span class="cap-info-val" style="color:var(--gd)">${c.cap.preco}</span></div>`:''}
    </div>

    <div class="stat-block">
      <div class="stat-block-title">BACKSTORY</div>
      <div class="lore-block"><p class="lore-text">${c.lore}</p></div>
    </div>

    <div class="stat-block">
      <div class="stat-block-title">HABILIDADES</div>
      <div class="ability-list">
        ${c.habilidades.map(h=>`
          <div class="ability-card">
            <div class="ability-name">${h.nome}</div>
            <div class="ability-desc">${h.desc}</div>
            <span class="ability-tag">${h.tag}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  // Animate bars
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    panel.querySelectorAll('.stat-bar-fill').forEach(bar=>{
      bar.style.width=bar.style.getPropertyValue('--w')||bar.getAttribute('style').match(/--w:([^;]+)/)?.[1]||'0%';
      const m=bar.getAttribute('style').match(/--w:(\d+)%/);
      if(m) bar.style.width=m[1]+'%';
    });
  }));
}

function renderAll(){renderRoster();renderArena();renderStats()}
renderAll();
</script>
</body>
</html>
