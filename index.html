<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script async src="https://vibej.am/2026/widget.js"></script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CapRush Overdrive!</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet"/>
<style>
:root{--red:#FF2A2A;--gold:#FFD700;--dark:#020208}
*{margin:0;padding:0;box-sizing:border-box;cursor:none}
html,body{height:100%;background:var(--dark);overflow:hidden;font-family:'Rajdhani',sans-serif}
#bg{position:fixed;inset:0;z-index:0}
nav{position:fixed;top:0;right:0;padding:18px 24px;z-index:20}
#flag-container{display:flex;gap:8px}
.flag-btn{width:30px;height:20px;border:1px solid rgba(255,255,255,.25);border-radius:3px;background-size:cover;opacity:.85;transition:.2s}
.flag-btn:hover{opacity:1;transform:scale(1.12)}
.flag-pt{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23009b3a"/><polygon points="1.5,0.2 2.7,1 1.5,1.8 0.3,1" fill="%23ffdf00"/><circle cx="1.5" cy="1" r="0.35" fill="%23002776"/></svg>')}
.flag-us{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23b22234"/><g fill="%23fff"><rect y="0.15" width="3" height="0.15"/><rect y="0.45" width="3" height="0.15"/><rect y="0.75" width="3" height="0.15"/><rect y="1.05" width="3" height="0.15"/><rect y="1.35" width="3" height="0.15"/><rect y="1.65" width="3" height="0.15"/></g><rect width="1.2" height="1.05" fill="%233c3b6e"/></svg>')}
.flag-es{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23c60b1e"/><rect y="0.5" width="3" height="1" fill="%23ffc400"/></svg>')}
.stage{position:relative;z-index:5;height:100vh;display:grid;place-items:center}
.orbit{position:relative;width:1000px;height:1000px}
.center-logo{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:520px;height:auto;z-index:10;display:grid;place-items:center;cursor:none}
.center-logo img{width:100%;height:auto;filter:drop-shadow(0 0 40px rgba(255,42,42,.35)) drop-shadow(0 0 80px rgba(255,215,0,.2));transition:filter .3s;pointer-events:none}
.center-logo:hover img{filter:drop-shadow(0 0 60px rgba(255,42,42,.55)) drop-shadow(0 0 120px rgba(255,215,0,.35))}
.cap{position:absolute;width:142px;height:142px;left:50%;top:50%;margin:-71px 0 0 -71px;border-radius:50%;text-decoration:none;z-index:5;transition:filter .2s}
.cap::before{content:'';position:absolute;inset:-7px;border-radius:50%;background:repeating-conic-gradient(from 0deg,var(--gold) 0deg 9deg,#7a5a0f 9deg 18deg);-webkit-mask:radial-gradient(circle,transparent 63%,#000 64%);mask:radial-gradient(circle,transparent 63%,#000 64%)}
.cap::after{content:'';position:absolute;inset:7px;border-radius:50%;background:radial-gradient(circle at 28% 22%,#ff3f3f,#9d0000 60%,#400000);box-shadow:inset 0 -12px 24px rgba(0,0,0,.8),inset 0 8px 16px rgba(255,255,255,.16)}
.cap span{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue';font-size:1.55rem;letter-spacing:3px;color:#fff;text-shadow:0 3px 0 #000,0 0 16px rgba(0,0,0,1);z-index:2}
.cap:hover{filter:brightness(1.35) drop-shadow(0 0 32px var(--gold));z-index:15}
.cursor{position:fixed;width:40px;height:40px;pointer-events:none;z-index:100;transform:translate(-50%,-50%)}
.cursor svg{width:100%;height:100%;animation:spin 2s linear infinite;filter:drop-shadow(0 0 14px var(--gold))}
@keyframes spin{to{transform:rotate(360deg)}}
.hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.28);font-size:.73rem;letter-spacing:2.2px}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="cursor" id="cur"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="#FFD700" stroke-width="5" stroke-dasharray="4 3"/><circle cx="50" cy="50" r="36" fill="#150000"/><text x="50" y="65" text-anchor="middle" font-family="Bebas Neue" font-size="38" fill="#FFD700">CR</text></svg></div>
<nav><div id="flag-container">
  <button class="flag-btn flag-pt" onclick="setLang('pt')"></button>
  <button class="flag-btn flag-us" onclick="setLang('en')"></button>
  <button class="flag-btn flag-es" onclick="setLang('es')"></button>
</div></nav>
<div class="stage">
  <div class="orbit">
    <div class="center-logo" id="center"><img src="Whisk_2_transparent.png" alt="CapRush Overdrive"></div>
    <a href="caprush-game.html" class="cap"><span data-i18n="play">JOGAR</span></a>
    <a href="personagens.html" class="cap"><span data-i18n="pilots">PILOTOS</span></a>
    <a href="ranking.html" class="cap"><span data-i18n="ranking">RANKING</span></a>
    <a href="manual.html" class="cap"><span data-i18n="manual">MANUAL</span></a>
  </div>
</div>
<div class="hint">passe o mouse no logo para girar</div>
<script src="/i18n.js"></script>
<script>
const cv=document.getElementById('bg'),x=cv.getContext('2d');function rs(){cv.width=innerWidth;cv.height=innerHeight}rs();addEventListener('resize',rs);const pts=Array(220).fill().map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.45,vy:(Math.random()-.5)*.45}));let mx=innerWidth/2,my=innerHeight/2;addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});(function a(){x.clearRect(0,0,cv.width,cv.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>cv.width)p.vx*=-1;if(p.y<0||p.y>cv.height)p.vy*=-1;const d=Math.hypot(p.x-mx,p.y-my);if(d<180){p.vx+=(p.x-mx)*0.00035;p.vy+=(p.y-my)*0.00035}x.beginPath();x.arc(p.x,p.y,1.4,0,7);x.fillStyle=d<180?'rgba(255,50,50,.85)':'rgba(255,30,30,.14)';x.fill()});requestAnimationFrame(a)})();
const cur=document.getElementById('cur');addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px'});
const caps=[...document.querySelectorAll('.cap')],cent=document.getElementById('center'),R=340;let ang=0,hover=false,vel=0;
function pos(){caps.forEach((el,i)=>{const a=ang+i*Math.PI/2;const tx=Math.cos(a)*R,ty=Math.sin(a)*R;const sc=el.matches(':hover')?1.08:1;el.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;});}
pos();cent.addEventListener('mouseenter',()=>hover=true);cent.addEventListener('mouseleave',()=>hover=false);
(function loop(){if(hover){vel=Math.min(vel+0.0007,0.012)}else{vel=Math.max(vel-0.0015,0)}ang+=vel;if(vel>0)pos();requestAnimationFrame(loop)})();
</script>
</body>
</html>
