<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CapRush Overdrive</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{height:100vh;background:#030308;overflow:hidden;font-family:'Rajdhani',sans-serif;color:#fff}#bg{position:fixed;inset:0;background:radial-gradient(circle at 50% 40%,#1a0f1f 0%,#030308 70%)}#logo{position:absolute;top:48%;left:50%;transform:translate(-50%,-50%);width:min(760px,90vw);filter:drop-shadow(0 0 60px rgba(255,42,42,.4));z-index:2}.cap{position:absolute;width:118px;height:118px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;color:#fff;font-family:'Bebas Neue';letter-spacing:2px;font-size:14px;z-index:3;background:radial-gradient(circle,#2a2a3a 0%,#141420 70%);border:3px solid currentColor;box-shadow:0 0 0 4px #0a0a14,inset 0 0 18px rgba(0,0,0,.8),0 0 24px currentColor;transition:.3s;overflow:hidden}.cap::before{content:'';position:absolute;inset:-8px;border-radius:50%;background:repeating-conic-gradient(from 0deg,currentColor 0deg 12deg,transparent 12deg 24deg);mask:radial-gradient(circle,transparent 58%,black 60%);opacity:.5}.cap:hover{transform:scale(1.15) rotate(8deg);box-shadow:0 0 0 4px #0a0a14,inset 0 0 24px rgba(0,0,0,.6),0 0 42px currentColor}.cap span:first-child{font-size:28px;margin-bottom:3px;filter:drop-shadow(0 2px 4px #000)}.c1{top:15%;left:14%;color:#ff3b3b}.c2{top:10%;right:15%;color:#00e5ff}.c3{bottom:17%;left:12%;color:#3b82f6}.c4{bottom:9%;left:50%;transform:translateX(-50%);color:#a855f7}.c5{bottom:19%;right:14%;color:#ffb02e}nav{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(5,5,12,.7);backdrop-filter:blur(8px);z-index:10;border-bottom:1px solid rgba(255,255,255,.06)}.nav-title{font-family:'Bebas Neue';letter-spacing:4px;font-size:1.2rem;background:linear-gradient(135deg,#ff2a2a,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#flag-container{display:flex;gap:6px}.flag-btn{width:28px;height:20px;border:1px solid rgba(255,255,255,.2);border-radius:3px;cursor:pointer;opacity:.7;background-size:cover}.flag-btn:hover{opacity:1}.flag-pt{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23009b3a"/><polygon points="1.5,0.2 2.7,1 1.5,1.8 0.3,1" fill="%23ffdf00"/><circle cx="1.5" cy="1" r="0.35" fill="%23002776"/></svg>')}.flag-us{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23b22234"/><g fill="%23fff"><rect y="0.15" width="3" height="0.15"/><rect y="0.45" width="3" height="0.15"/><rect y="0.75" width="3" height="0.15"/><rect y="1.05" width="3" height="0.15"/><rect y="1.35" width="3" height="0.15"/><rect y="1.65" width="3" height="0.15"/></g><rect width="1.2" height="1.05" fill="%233c3b6e"/></svg>')}.flag-es{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23c60b1e"/><rect y="0.5" width="3" height="1" fill="%23ffc400"/></svg>')}</style></head><body><div id="bg"></div><nav><div class="nav-title">CAPRUSH</div><div id="flag-container"></div></nav><img id="logo" src="Whisk_2_transparent.png" alt="CapRush"><a href="caprush-game.html" class="cap c1"><span>▶</span><span id="nav-jogar">JOGAR</span></a><a href="personagens.html" class="cap c2"><span>●</span><span id="nav-pilotos">PILOTOS</span></a><a href="ranking.html" class="cap c3"><span>≡</span><span id="nav-ranking">RANKING</span></a><a href="manual.html" class="cap c4"><span>☰</span><span id="nav-manual">MANUAL</span></a><a href="arquitetura.html" class="cap c5"><span>◎</span><span id="nav-arq">ARQT.</span></a><script src="i18n.js"></script><script>document.addEventListener('DOMContentLoaded',()=>{const f=document.getElementById('flag-container');if(f){f.innerHTML='<button class="flag-btn flag-pt" onclick="setLang(\'pt\')" title="Português"></button><button class="flag-btn flag-us" onclick="setLang(\'en\')" title="English"></button><button class="flag-btn flag-es" onclick="setLang(\'es\')" title="Español"></button>'}})</script></body></html>
