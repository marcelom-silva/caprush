<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script async src="https://vibej.am/2026/widget.js"></script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CapRush Overdrive!</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet"/>
<!-- Marco 2: Privy Embedded Wallet -->
<script type="module" src="privy-auth.js"></script>
<style>
body{min-height:100vh;width:100%;overflow-x:hidden;overflow:hidden;position:relative;z-index:1;}
:root{--red:#FF2A2A;--gold:#FFD700;--dark:#020208}
*{margin:0;padding:0;box-sizing:border-box;cursor:none}
html,body{height:100%;background:#020208;overflow-x:hidden;}
nav{position:fixed;top:0;right:0;padding:18px 24px;z-index:3;display:flex;gap:12px;align-items:center}
#flag-container{display:flex;gap:8px}
.flag-btn{width:30px;height:20px;border:1px solid rgba(255,255,255,.25);border-radius:3px;background-size:cover;opacity:.85;transition:.2s;cursor:none}
.flag-btn:hover{opacity:1;transform:scale(1.12)}
.flag-pt{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23009b3a"/><polygon points="1.5,0.2 2.7,1 1.5,1.8 0.3,1" fill="%23ffdf00"/><circle cx="1.5" cy="1" r="0.35" fill="%23002776"/></svg>')}
.flag-us{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23b22234"/><g fill="%23fff"><rect y="0.15" width="3" height="0.15"/><rect y="0.45" width="3" height="0.15"/><rect y="0.75" width="3" height="0.15"/><rect y="1.05" width="3" height="0.15"/><rect y="1.35" width="3" height="0.15"/><rect y="1.65" width="3" height="0.15"/></g><rect width="1.2" height="1.05" fill="%233c3b6e"/></svg>')}
.flag-es{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23c60b1e"/><rect y="0.5" width="3" height="1" fill="%23ffc400"/></svg>')}
.login-btn{background:linear-gradient(135deg,var(--red),var(--gold));border:none;padding:8px 16px;border-radius:20px;font-family:'Bebas Neue';letter-spacing:2px;color:#000;font-size:.9rem;cursor:none;transition:.2s}
.login-btn:hover{filter:brightness(1.2);transform:scale(1.05)}
.stage{position:relative;z-index:2;height:100vh;display:grid;place-items:center}
.orbit{position:relative;width:min(90vw,1000px);height:min(90vw,1000px);}
.center-logo{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:520px;height:auto;z-index:10;display:grid;place-items:center;cursor:none}
.center-logo img{width:100%;height:auto;filter:drop-shadow(0 0 40px rgba(255,42,42,.35)) drop-shadow(0 0 80px rgba(255,215,0,.2));transition:filter .3s;pointer-events:none}
.center-logo:hover img{filter:drop-shadow(0 0 60px rgba(255,42,42,.55)) drop-shadow(0 0 120px rgba(255,215,0,.35))}
.cap{position:absolute;width:142px;height:142px;left:50%;top:50%;margin:-71px 0 0 -71px;border-radius:50%;text-decoration:none;z-index:5;transition:transform .15s ease,filter .2s ease}
.cap::before{content:'';position:absolute;inset:-7px;border-radius:50%;background:repeating-conic-gradient(from 0deg,var(--gold) 0deg 9deg,#7a5a0f 9deg 18deg);-webkit-mask:radial-gradient(circle,transparent 63%,#000 64%);mask:radial-gradient(circle,transparent 63%,#000 64%)}
.cap::after{content:'';position:absolute;inset:7px;border-radius:50%;background:radial-gradient(circle at 28% 22%,#ff3f3f,#9d0000 60%,#400000);box-shadow:inset 0 -12px 24px rgba(0,0,0,.8),inset 0 8px 16px rgba(255,255,255,.16)}
.cap span{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue';font-size:1.55rem;letter-spacing:3px;color:#fff;text-shadow:0 3px 0 #000,0 0 16px rgba(0,0,0,1);z-index:2}
.cap:hover{filter:brightness(1.35) drop-shadow(0 0 32px var(--gold));z-index:15;transform:scale(1.15)}
/* ── Tampinha $CR ── */
#cr-cap::after{background:transparent!important;box-shadow:none!important;}
#cr-cap:hover::after{box-shadow:none!important;}
#cr-logo-inner{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:82px;height:82px;object-fit:contain;z-index:3;display:block;filter:drop-shadow(0 0 8px rgba(255,200,0,.45));}
#cr-cap span#nav-cr-bal{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:.82rem;letter-spacing:1.5px;color:#FFD700;text-shadow:0 1px 0 #000,0 0 12px rgba(255,180,0,1);line-height:1.3;white-space:nowrap;z-index:3;text-align:center;}
.cap.locked{filter:grayscale(.8) brightness(.6);pointer-events:none}
.cursor{position:fixed;width:40px;height:40px;pointer-events:none;z-index:100;transform:translate(-50%,-50%)}
.cursor svg{width:100%;height:100%;animation:spin 2s linear infinite;filter:drop-shadow(0 0 14px var(--gold))}
@keyframes spin{to{transform:rotate(360deg)}}
.hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.28);font-size:.73rem;letter-spacing:2.2px;transition:.3s}
.user-info{display:flex;align-items:center;gap:8px}
.user-avatar{width:30px;height:30px;border-radius:50%;border:2px solid var(--gold)}
.user-nick{color:var(--gold);font-family:'Bebas Neue';letter-spacing:2px;font-size:.9rem}

/* ── Modal Nickname ── */
#nick-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center}
#nick-modal.open{display:flex}
.nick-box{background:linear-gradient(180deg,rgba(10,10,25,.97),rgba(5,5,15,.99));border:1px solid rgba(255,215,0,.3);border-radius:16px;padding:40px 36px;text-align:center;max-width:380px;width:90%;box-shadow:0 0 60px rgba(255,42,42,.2)}
.nick-box h2{font-family:'Bebas Neue';font-size:2rem;letter-spacing:4px;background:linear-gradient(135deg,var(--red),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.nick-box p{color:#888;font-size:.85rem;letter-spacing:1px;margin-bottom:20px}
.nick-box input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,215,0,.3);border-radius:8px;padding:12px 16px;color:#fff;font-family:'Bebas Neue';font-size:1.2rem;letter-spacing:3px;text-align:center;outline:none;cursor:auto;transition:border-color .2s}
.nick-box input:focus{border-color:var(--gold)}
.nick-box button{margin-top:16px;width:100%;padding:14px;background:linear-gradient(135deg,var(--red),var(--gold));border:none;border-radius:8px;font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:3px;color:#000;cursor:auto;transition:.2s}
.nick-box button:hover{filter:brightness(1.15)}
.nick-error{color:var(--red);font-size:.75rem;margin-top:6px;display:none}
</style>
</head>
<body>

<div class="cursor" id="cur">
  <svg viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#FFD700" stroke-width="5" stroke-dasharray="4 3"/>
    <circle cx="50" cy="50" r="36" fill="#150000"/>
    <text x="50" y="65" text-anchor="middle" font-family="Bebas Neue" font-size="38" fill="#FFD700">CR</text>
  </svg>
</div>

<!-- Modal Nickname -->
<div id="nick-modal">
  <div class="nick-box">
    <h2>ESCOLHA SEU NICKNAME</h2>
    <p>Como você quer aparecer no ranking?<br>3-16 caracteres, sem espaços</p>
    <input id="nick-input" maxlength="16" placeholder="PILOTO123" autocomplete="off"/>
    <div class="nick-error" id="nick-error">Mínimo 3 caracteres, sem espaços</div>
    <button id="nick-confirm">CONFIRMAR ▶</button>
  </div>
</div>

<nav>
  <div id="user-display" style="display:none" class="user-info">
    <img id="user-avatar" class="user-avatar" src="" alt="" onerror="this.style.display='none';document.getElementById('user-initials').style.display='flex'"/><div id="user-initials" style="display:none;width:30px;height:30px;border-radius:50%;border:2px solid var(--gold);background:#1A0505;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:.75rem;color:var(--gold);" id="user-initials"></div>
    <span id="user-nick" class="user-nick"></span>
    <span id="wallet-pill" style="display:none;background:rgba(255,107,0,.12);border:1px solid rgba(255,107,0,.3);border-radius:20px;padding:3px 10px;font-family:monospace;font-size:.68rem;color:#ff9944;cursor:pointer;" title="Copiar endereço Solana" onclick="(function(){var a=localStorage.getItem('caprush_wallet');if(a&&navigator.clipboard)navigator.clipboard.writeText(a);})()"></span>
    <button class="login-btn" onclick="privyLogout()" style="font-size:.7rem;padding:5px 10px;margin-left:4px">SAIR</button>
  </div>
  <button id="loginBtn" class="login-btn" onclick="privyLogin()">ENTRAR COM GOOGLE</button>
  <button id="soundBtn" onclick="toggleAudio()" class="login-btn" style="padding:6px 10px;border-radius:50%;width:42px;height:42px;font-size:18px">🔇</button>
  <div id="flag-container">
    <button class="flag-btn flag-pt" onclick="setLang('pt')"></button>
    <button class="flag-btn flag-us" onclick="setLang('en')"></button>
    <button class="flag-btn flag-es" onclick="setLang('es')"></button>
  </div>
</nav>

<div class="stage">
  <div class="orbit">
    <div class="center-logo" id="center">
      <img src="Whisk_2_transparent.png" alt="CapRush Overdrive">
    </div>
    <a href="personagens.html" class="cap locked" id="playBtn"><span data-i18n="play">JOGAR</span></a>
    <a href="personagens.html"  class="cap"><span data-i18n="pilots">PILOTOS</span></a>
    <a href="ranking.html"      class="cap"><span data-i18n="ranking">RANKING</span></a>
    <a href="manual.html"       class="cap"><span data-i18n="manual">MANUAL</span></a>
    <span class="cap locked" title="Em breve!"><span data-i18n="garage">GARAGEM</span></span>
    <a href="caprush-brand.html" class="cap"><span data-i18n="saiba_mais">Saiba+</span></a>
    <a href="dashboard.html" class="cap" id="cr-cap">
      <img id="cr-logo-inner" src="tokenCR.png" alt="$CR"/>
      <span id="nav-cr-bal">0<br/>$CR</span>
    </a>
  </div>
</div>

<div class="hint" id="hint-txt">faça login para jogar</div>

<script src="i18n.js"></script>
<script>
// ── Cursor ────────────────────────────────────────────────────────────────
var cur=document.getElementById('cur');
addEventListener('mousemove',function(e){cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px'});

// ── Órbita ────────────────────────────────────────────────────────────────
var caps=[].slice.call(document.querySelectorAll('.cap'));
var cent=document.getElementById('center'),R=340,ang=0,hover=false,vel=0;
function posOr(){var n=caps.length;caps.forEach(function(el,i){var a=ang+i*(Math.PI*2/n);el.style.transform='translate('+(Math.cos(a)*R)+'px,'+(Math.sin(a)*R)+'px)';});}
posOr();
cent.addEventListener('mouseenter',function(){hover=true;});
cent.addEventListener('mouseleave',function(){hover=false;});
(function loop(){hover?vel=Math.min(vel+0.0007,0.012):vel=Math.max(vel-0.0015,0);ang+=vel;if(vel>0)posOr();requestAnimationFrame(loop);})();
caps.forEach(function(el){
  el.addEventListener('click',function(e){
    if(el.classList.contains('locked')){e.preventDefault();return;}
    var link=el.getAttribute('href');
    document.body.style.transition='transform 0.5s ease-in,opacity 0.5s';
    document.body.style.transform='scale(1.6)';document.body.style.opacity='0.4';
    setTimeout(function(){window.location.href=link;},300);
  });
});

// ── Sessão / UI ───────────────────────────────────────────────────────────
function applySession(s){
  if(!s) return;
  document.getElementById('loginBtn').style.display='none';
  document.getElementById('user-display').style.display='flex';
  var av=document.getElementById('user-avatar');
  if(s.picture) av.src=s.picture; else av.style.display='none';
  document.getElementById('user-nick').textContent=s.nickname||s.name||'PILOTO';
  var ini=document.getElementById('user-initials');if(ini)ini.textContent=(s.nickname||s.name||'P').charAt(0);
  document.getElementById('playBtn').classList.remove('locked');
  document.getElementById('hint-txt').textContent='Clique em JOGAR para começar';
  window.CAPRUSH_NICKNAME=s.nickname||s.name;
  var addr=s.walletAddress||localStorage.getItem('caprush_wallet')||'';
  if(addr&&addr.length>8){var p=document.getElementById('wallet-pill');if(p){p.textContent=addr.slice(0,4)+'..'+addr.slice(-4);p.style.display='inline-block';}}
  if(typeof CREngine!=='undefined'){CREngine.getBalance(function(bal){var el=document.getElementById('nav-cr-bal');if(el)el.innerHTML=bal.toFixed(1)+'<br/>$CR';});}
}
function applyLogout(){
  document.getElementById('loginBtn').style.display='';
  document.getElementById('user-display').style.display='none';
  document.getElementById('playBtn').classList.add('locked');
  document.getElementById('hint-txt').textContent='faça login para jogar';
  var p=document.getElementById('wallet-pill');if(p)p.style.display='none';
}

// ── Nickname modal ─────────────────────────────────────────────────────────
var _pendingSession=null;
function _openNickModal(s){
  _pendingSession=s;
  document.getElementById('nick-modal').classList.add('open');
  document.getElementById('nick-input').value=(s.name||'').split(' ')[0].toUpperCase().replace(/[^A-Z0-9]/g,'');
  setTimeout(function(){document.getElementById('nick-input').focus();},100);
}
document.getElementById('nick-confirm').onclick=function(){
  var raw=document.getElementById('nick-input').value.trim().replace(/\s/g,'').toUpperCase();
  var err=document.getElementById('nick-error');
  if(raw.length<3){err.style.display='block';return;}
  err.style.display='none';if(!_pendingSession)return;
  localStorage.setItem('caprush_nickname',raw);localStorage.setItem('caprush_nick',raw);
  _pendingSession.nickname=raw;
  localStorage.setItem('caprush_privy_session',JSON.stringify(_pendingSession));
  // Salva em caprush_user também para retrocompat com cr-engine.js
  localStorage.setItem('caprush_user',JSON.stringify({google_id:_pendingSession.google_id,nickname:raw,name:_pendingSession.name,picture:_pendingSession.picture,email:_pendingSession.email}));
  _pendingSession=null;document.getElementById('nick-modal').classList.remove('open');
  applySession(JSON.parse(localStorage.getItem('caprush_privy_session')||'{}'));
};
document.getElementById('nick-input').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('nick-confirm').click();});

// ── Privy ──────────────────────────────────────────────────────────────────
function privyLogin(){
  var btn=document.getElementById('loginBtn');btn.textContent='CONECTANDO...';btn.disabled=true;
  function go(){PrivyAuth.login().catch(function(){btn.textContent='ENTRAR COM GOOGLE';btn.disabled=false;});}
  if(window.PrivyAuth)go();else window.addEventListener('privyAuthReady',function once(){window.removeEventListener('privyAuthReady',once);go();});
}
function privyLogout(){
  // Limpa tudo ANTES de chamar PrivyAuth.logout() para garantir estado limpo
  localStorage.removeItem('caprush_user');
  localStorage.removeItem('caprush_privy_session');
  localStorage.removeItem('caprush_wallet');
  localStorage.removeItem('caprush_custom_nickname');
  if(window.PrivyAuth){PrivyAuth.logout().catch(function(){});}
  applyLogout();
  // Reload garante que o iframe do Privy e o estado da página sejam limpos
  setTimeout(function(){location.reload();},300);
}
window.addEventListener('privyAuthLogin',function(e){
  var s=e.detail;document.getElementById('loginBtn').textContent='ENTRAR COM GOOGLE';document.getElementById('loginBtn').disabled=false;
  if(!localStorage.getItem('caprush_custom_nickname')){localStorage.setItem('caprush_custom_nickname','1');_openNickModal(s);}else{applySession(s);}
});
window.addEventListener('privyAuthLogout',function(){applyLogout();});
window.addEventListener('privyAuthError',function(){
  document.getElementById('loginBtn').textContent='ENTRAR COM GOOGLE';document.getElementById('loginBtn').disabled=false;
  document.getElementById('hint-txt').textContent='Erro no login. Tente novamente.';
  setTimeout(function(){document.getElementById('hint-txt').textContent='faça login para jogar';},4000);
});

// ── Restore de sessão ──────────────────────────────────────────────────────
function tryRestoreSession(){
  if(!window.PrivyAuth)return;
  var stored=PrivyAuth.getSession();
  if(stored&&stored.id){
    applySession(stored);
    PrivyAuth.restoreSession().then(function(fresh){if(fresh)applySession(fresh);}).catch(function(){});
  }
}
window.addEventListener('privyAuthReady',tryRestoreSession);
if(window.PrivyAuth)tryRestoreSession();

// ── Retrocompatibilidade Marco 1 ───────────────────────────────────────────
// SÓ restaura sessão Google antiga se NÃO houver logout explícito registrado.
// O logout agora remove caprush_user, então esta condição nunca é verdadeira pós-logout.
window.addEventListener('load',function(){
  var hasPrivy=!!localStorage.getItem('caprush_privy_session');
  var hasLegacy=null;try{hasLegacy=JSON.parse(localStorage.getItem('caprush_user')||'null');}catch(e){}
  if(!hasPrivy&&hasLegacy&&hasLegacy.google_id){applySession(hasLegacy);}
});

window.addEventListener('pageshow',function(){
  document.body.style.transform='scale(1)';
  document.body.style.opacity='1';
});
</script>
<script src="cr-engine.js"></script>
<script src="audio.js"></script>
<script src="background.js"></script>

<script>
// Load CR balance into nav display
(function(){
  if(typeof CREngine === 'undefined') return;
  CREngine.getBalance(function(bal){
    var el = document.getElementById('nav-cr-bal');
    if(el) el.textContent = bal.toFixed(1) + ' $CR';
  });
})();
</script>
</body>
</html>
