<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script async src="https://vibej.am/2026/widget.js"></script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CapRush — Pilotos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--red:#FF2A2A;--gold:#FFD700;--dark:#0A0A0F;--acc:#00E5FF;}
*{margin:0;padding:0;box-sizing:border-box;}
/* Marco 2.9.2: body transparente para o background.js animado aparecer */
html{width:100%;min-height:100vh;background:var(--dark);color:#E8E8F0;font-family:'Rajdhani',sans-serif;overflow-x:hidden;}
body{width:100%;min-height:100vh;background:transparent;color:#E8E8F0;font-family:'Rajdhani',sans-serif;overflow-x:hidden;}
body::before{content:"";position:fixed;inset:0;z-index:-2;background:
  radial-gradient(1200px 800px at 80% -20%,rgba(255,42,42,.10),transparent 60%),
  radial-gradient(900px 600px at 10% 120%,rgba(0,229,255,.08),transparent 60%),#0A0A0F;}
body::after{content:"";position:fixed;inset:0;z-index:-1;opacity:.03;
  background-image:linear-gradient(rgba(255,255,255,.1)1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.1)1px,transparent 1px);
  background-size:44px 44px;animation:gridMove 20s linear infinite;}
@keyframes gridMove{to{background-position:44px 44px;}}

/* ── NAV ─────────────────────────────────────────────────────── */
nav{display:flex;align-items:center;padding:12px 24px;
  background:rgba(5,5,12,.75);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,42,42,.25);gap:1.4rem;
  position:sticky;top:0;z-index:50;}
.nav-logo{font-family:'Bebas Neue';font-size:1.35rem;letter-spacing:4px;
  background:linear-gradient(135deg,var(--red),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.nav-link{color:#AAA;text-decoration:none;font-size:.9rem;letter-spacing:2px;
  text-transform:uppercase;transition:.2s;}
.nav-link:hover,.nav-link.active{color:var(--gold);}
.nav-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
#flag-container{display:flex;gap:6px;}
.flag-btn{width:24px;height:16px;border:1px solid rgba(255,255,255,.2);border-radius:3px;
  cursor:pointer;opacity:.6;background-size:cover;background-position:center;transition:.2s;}
.flag-btn:hover{opacity:1;border-color:var(--gold);}
.flag-pt{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23009b3a"/><polygon points="1.5,0.2 2.7,1 1.5,1.8 0.3,1" fill="%23ffdf00"/><circle cx="1.5" cy="1" r="0.35" fill="%23002776"/></svg>')}
.flag-us{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23b22234"/><g fill="%23fff"><rect y="0.15" width="3" height="0.15"/><rect y="0.45" width="3" height="0.15"/><rect y="0.75" width="3" height="0.15"/><rect y="1.05" width="3" height="0.15"/><rect y="1.35" width="3" height="0.15"/><rect y="1.65" width="3" height="0.15"/></g><rect width="1.2" height="1.05" fill="%233c3b6e"/></svg>')}
.flag-es{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23c60b1e"/><rect y="0.5" width="3" height="1" fill="%23ffc400"/></svg>')}
.sound-btn{background:linear-gradient(135deg,var(--red),var(--gold));border:none;
  width:38px;height:38px;border-radius:50%;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.2s;}
.sound-btn:hover{filter:brightness(1.2);}

/* ── HERO ────────────────────────────────────────────────────── */
.hero{text-align:center;padding:40px 20px 12px;}
.hero h1{font-family:'Bebas Neue';font-size:clamp(2.5rem,7vw,4.5rem);letter-spacing:6px;
  background:linear-gradient(135deg,var(--red),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{color:#888;letter-spacing:2px;font-size:.88rem;text-transform:uppercase;margin-top:.4rem;}

/* ── WELCOME-BACK BANNER ─────────────────────────────────────── */
.welcome-back{max-width:880px;margin:8px auto 0;
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.3);
  border-radius:10px;padding:12px 14px;font-size:.85rem;color:#cda;display:none;}

/* ── FILTERS ─────────────────────────────────────────────────── */
.filters{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  padding:18px 20px 8px;max-width:1100px;margin:0 auto;}
.fbtn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:#aaa;font-family:'Bebas Neue';letter-spacing:2px;font-size:.78rem;
  padding:6px 16px;border-radius:18px;cursor:pointer;transition:.15s;}
.fbtn:hover{border-color:rgba(255,215,0,.4);color:#fff;}
.fbtn.active{background:var(--gold);color:#000;border-color:var(--gold);}

/* ── GRID ────────────────────────────────────────────────────── */
.grid{display:flex;flex-wrap:wrap;justify-content:center;gap:28px;
  padding:16px 24px 140px;max-width:1400px;margin:0 auto;}

/* ── CARD BASE ───────────────────────────────────────────────── */
.card{
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  width:290px;
  position:relative;
  overflow:hidden;
  transition:transform .3s,box-shadow .3s,border-color .3s;
}

/* Available cards */
.card.available{cursor:pointer;}
.card.available:hover{
  transform:translateY(-8px);
  box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 40px rgba(255,215,0,.15);
  border-color:rgba(255,215,0,.3);}
.card.selected{
  border-color:var(--gold)!important;
  box-shadow:0 0 40px rgba(255,215,0,.35)!important;}

/* Locked cards */
.card.locked{cursor:default;}
.card.locked::before{
  content:"";position:absolute;inset:0;
  background:rgba(0,0,0,.42);z-index:8;border-radius:16px;}

/* Boss card */
.card.boss{border-color:rgba(255,42,42,.4);}
.card.boss::before{
  content:"";position:absolute;inset:0;
  background:rgba(0,0,0,.55);z-index:8;border-radius:16px;}

/* ── CARD TOP (image area) ───────────────────────────────────── */
.card-top{
  position:relative;padding:0;
  display:flex;justify-content:center;align-items:flex-end;
  min-height:280px;
  background:radial-gradient(circle at 50% 40%,rgba(255,255,255,.06),transparent 70%);}
.badge{
  position:absolute;top:12px;left:12px;
  font-size:.65rem;letter-spacing:2px;padding:3px 8px;
  border-radius:12px;border:1px solid;
  font-family:'Bebas Neue';z-index:3;}
.char-img{
  width:100%;height:268px;
  object-fit:contain;object-position:bottom;
  filter:drop-shadow(0 12px 24px rgba(0,0,0,.6));}

/* ── LOCK OVERLAY ─────────────────────────────────────────────── */
.lock-overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:10;gap:10px;}
.lock-icon{
  width:70px;height:70px;border-radius:50%;
  background:rgba(0,0,0,.65);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(255,215,0,.3);
  animation:pulseLock 2.5s infinite;}
.lock-icon svg{width:34px;height:34px;fill:#FFD700;}
.lock-cost{
  font-family:'Bebas Neue';letter-spacing:3px;font-size:1.1rem;color:var(--gold);
  background:rgba(0,0,0,.7);padding:5px 14px;border-radius:14px;
  border:1px solid rgba(255,215,0,.4);}
@keyframes pulseLock{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}

/* ── CARD BODY (stats area) ──────────────────────────────────── */
.card-body{padding:14px 16px 52px;}
.card-name{font-family:'Bebas Neue';font-size:1.5rem;letter-spacing:4px;margin-bottom:4px;}
.code{font-size:.65rem;color:#555;letter-spacing:2px;margin-bottom:10px;}
.stat-row{display:flex;align-items:center;gap:6px;margin:5px 0;}
.stat-label{font-size:.7rem;color:#888;letter-spacing:1px;width:80px;flex-shrink:0;}
.stat-bar{flex:1;height:5px;background:#1A1A2E;border-radius:3px;overflow:hidden;}
.stat-fill{height:100%;border-radius:3px;transition:width 1.1s ease;}
.stat-val{font-family:'Bebas Neue';font-size:.95rem;color:#fff;width:30px;text-align:right;}
.card-lore{
  font-size:.72rem;color:#888;line-height:1.45;margin-top:10px;
  font-style:italic;min-height:48px;}

/* ── SELECT BTN (parte inferior do card) ──────────────────────── */
.select-btn{
  position:absolute;left:0;right:0;bottom:0;
  padding:10px;text-align:center;
  font-family:'Bebas Neue';letter-spacing:3px;font-size:.85rem;
  background:rgba(10,10,25,.0);color:transparent;
  transition:background .25s,color .25s;
  border:none;width:100%;cursor:pointer;}
.card.available:hover .select-btn{
  background:linear-gradient(135deg,rgba(255,42,42,.92),rgba(255,140,0,.92));
  color:#fff;}
.card.selected .select-btn{
  background:linear-gradient(135deg,rgba(255,215,0,.88),rgba(255,140,0,.88));
  color:#000!important;}

/* Botão DESBLOQUEAR no rodapé do card (em vez do meio) */
.select-btn.unlock-btn{
  background:linear-gradient(135deg,rgba(255,215,0,.88),rgba(255,140,0,.88));
  color:#000;cursor:pointer;
  z-index:11; /* fica acima do ::before do .locked */}
.select-btn.unlock-btn:hover{
  background:linear-gradient(135deg,var(--gold),#FF6600);
  filter:brightness(1.1);}
.select-btn.unlock-btn:disabled{opacity:.5;cursor:not-allowed;}

/* Tag NPC no rodapé do RACER-D */
.select-btn.npc-tag{
  background:rgba(255,42,42,.18);
  color:var(--red);
  border-top:1px solid rgba(255,42,42,.35);
  letter-spacing:5px;
  z-index:11;}

/* ── ACTION BAR ──────────────────────────────────────────────── */
#action-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:60;
  padding:18px 24px 28px;
  background:linear-gradient(0deg,rgba(5,5,15,1) 75%,transparent);
  display:none;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;}
#action-bar.show{display:flex;}
#selected-info{font-family:'Bebas Neue';letter-spacing:3px;font-size:1.1rem;color:var(--gold);}
.mode-btn{
  font-family:'Bebas Neue';letter-spacing:3px;font-size:1rem;
  padding:12px 32px;border-radius:8px;border:none;cursor:pointer;transition:.2s;
  text-decoration:none;display:inline-block;}
.mode-btn.solo{background:linear-gradient(135deg,var(--red),#FF6600);color:#fff;}
.mode-btn.duo{background:linear-gradient(135deg,var(--acc),#0066FF);color:#000;}
.mode-btn.garage{background:linear-gradient(135deg,var(--gold),#FF8C00);color:#000;}
.mode-btn:hover{transform:translateY(-3px);filter:brightness(1.15);}

/* ── TOAST ───────────────────────────────────────────────────── */
.toast{position:fixed;top:80px;right:14px;background:rgba(8,8,16,.96);
  border:1px solid var(--gold);border-radius:10px;padding:12px 16px;
  font-size:.85rem;color:#fff;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.6);}
.toast.err{border-color:var(--red);}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="../index.html" class="nav-logo">CAP RUSH</a>
  <a href="ranking.html" class="nav-link" data-i18n="ranking">RANKING</a>
  <a href="manual.html"  class="nav-link" data-i18n="manual">MANUAL</a>
  <a href="../dashboard.html" class="nav-link" data-i18n="dash_nav">CARTEIRA</a>
  <a href="garagem.html" class="nav-link" data-i18n="garage">GARAGEM</a>
  <span style="color:var(--gold);font-family:Bebas Neue;letter-spacing:3px;font-size:.95rem;" data-i18n="pilots">PILOTOS</span>
  <div class="nav-right">
    <button id="soundBtn" onclick="toggleAudio()" class="sound-btn">🔇</button>
    <div id="flag-container">
      <button class="flag-btn flag-pt" onclick="setLang('pt')"></button>
      <button class="flag-btn flag-us" onclick="setLang('en')"></button>
      <button class="flag-btn flag-es" onclick="setLang('es')"></button>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1 data-i18n="pilots-title">ESCOLHA SEU PILOTO</h1>
  <p data-i18n="pilots-sub">Cada tampinha é um NFT com atributos próprios — desbloqueie com $CR e personalize na Garagem</p>
</div>

<!-- WELCOME BACK -->
<div class="welcome-back" id="welcome-back"></div>

<!-- FILTERS -->
<div class="filters" id="filters"></div>

<!-- CARDS GRID -->
<div class="grid" id="grid"></div>

<!-- ACTION BAR — preenchido dinamicamente conforme tampinha selecionada -->
<div id="action-bar">
  <span id="selected-info" data-i18n="pilots_choose_mode">ESCOLHA O MODO</span>
  <div id="action-buttons"></div>
</div>

<script src="../src/ui/i18n.js"></script>
<script src="../src/engines/cr-engine.js"></script>
<script src="../src/engines/pilots-data.js"></script>
<script src="../src/engines/pilot-evolution.js"></script>
<script src="../src/engines/badges-engine.js"></script>
<script src="../src/ui/audio.js"></script>
<script src="../src/ui/background.js"></script>

<script>
function setLang(l){ if(window.I18N) I18N.setLang(l); localStorage.setItem('lang',l); }
function _t(k,fb){ try{return window.I18N?I18N.t(k,fb):fb;}catch(e){return fb;} }

(function(){
  if(typeof PilotsData === 'undefined'){
    document.getElementById('grid').innerHTML =
      '<div style="text-align:center;color:#888;padding:60px;">PilotsData engine não carregado.</div>';
    return;
  }

  // Migração silenciosa: se piloto antigo não está mais desbloqueado, mostra banner
  var oldPid = localStorage.getItem('caprush_pilot');
  var oldNames = { 'YUKI':'Yuki', 'KENTA':'Kenta', 'BRUNA':'Bruna', 'TAPZ':'Tapz', 'DUO':'Duo' };
  if(oldPid && oldNames[oldPid] && !PilotsData.isUnlocked(oldPid)){
    var wb = document.getElementById('welcome-back');
    wb.style.display = 'block';
    wb.innerHTML = '<b>'+oldNames[oldPid]+'</b> '+_t('pilots_old_locked',
      'agora é uma NFT bloqueada! Os comuns CAL, JOÃO e SHERLOCK estão liberados pra todos. Escolha um piloto e prossiga.');
    localStorage.removeItem('caprush_pilot');
  }

  // ── FILTROS ─────────────────────────────────────────────────
  var fEl = document.getElementById('filters');
  var rarities = ['all','comum','incomum','rara','mitica','lendaria','boss'];
  var rarityKeys = {
    all:'pilots_filter_all', comum:'pilots_filter_common', incomum:'pilots_filter_uncommon',
    rara:'pilots_filter_rare', mitica:'pilots_filter_mythic',
    lendaria:'pilots_filter_legendary', boss:'pilots_filter_boss'
  };
  var currentFilter = 'all';
  rarities.forEach(function(r){
    var b = document.createElement('button');
    b.className = 'fbtn' + (r === 'all' ? ' active' : '');
    b.textContent = _t(rarityKeys[r], r.toUpperCase());
    b.onclick = function(){
      currentFilter = r;
      Array.prototype.forEach.call(fEl.children, function(x){ x.classList.toggle('active', x === b); });
      renderGrid();
    };
    fEl.appendChild(b);
  });

  // ── HELPERS ─────────────────────────────────────────────────
  function getCurrentSelected(){
    var p = PilotsData.getSelected();
    return p ? p.id : null;
  }

  function showToast(msg, kind){
    var t = document.createElement('div');
    t.className = 'toast ' + (kind || '');
    t.innerHTML = msg;
    document.body.appendChild(t);
    setTimeout(function(){ t.style.opacity='0'; t.style.transition='.4s'; }, 2800);
    setTimeout(function(){ t.remove(); }, 3300);
  }

  function rarityLabel(r){ return _t('pilot-'+r, PilotsData.rarityLabels[r] || ''); }

  // ── BUILD CARD ──────────────────────────────────────────────
  function buildCard(p){
    var unlocked = PilotsData.isUnlocked(p.id);
    var selected = (getCurrentSelected() === p.id);
    var canSelect = p.playable && unlocked;
    var rColor = PilotsData.rarityColors[p.rarity] || '#888';
    var rgbBg = _hexToRgba(rColor, 0.10);
    var rgbBg2 = _hexToRgba(rColor, 0.15);

    var card = document.createElement('div');
    card.id = 'card-' + p.id;

    if(p.rarity === 'boss'){
      card.className = 'card boss';
    } else if(canSelect){
      card.className = 'card available' + (selected ? ' selected' : '');
      card.onclick = function(){ selectPilot(p.id); };
    } else {
      card.className = 'card locked';
    }

    // Card top com imagem
    var topBg = 'background:radial-gradient(circle at 50% 60%,'+rgbBg2+',transparent 70%)';
    var html = '<div class="card-top" style="'+topBg+'">';
    html += '<span class="badge" style="color:'+rColor+';border-color:'+rColor+';background:'+rgbBg+';" data-i18n="pilot-'+p.rarity+'">◆ '+rarityLabel(p.rarity)+'</span>';
    html += '<img class="char-img" src="'+p.img+'" alt="'+p.name+'"/>';
    html += '</div>';

    // Lock / Boss overlay (apenas indicador visual, sem botão)
    if(!unlocked && p.playable){
      html += '<div class="lock-overlay">';
      html += '<div class="lock-icon"><svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5zm-3 5a3 3 0 1 1 6 0v3H9V7z"/></svg></div>';
      html += '<div class="lock-cost">'+p.cost+' $CR</div>';
      html += '</div>';
    }

    // Card body com stats
    var loreKey = p.id.toLowerCase().replace(/_/g,'-') + '-lore';
    if(p.id === 'RACER_D') loreKey = 'racer-d-lore';

    html += '<div class="card-body">';
    html += '<div class="card-name" style="color:'+rColor+'">'+p.name+'</div>';
    html += '<div class="code">'+p.code+' · '+p.species+'</div>';

    // Badge de pontos disponíveis (Marco 2.5) — só pra jogáveis
    if(p.playable){
      html += '<div id="evo-badge-'+p.id+'" style="display:none;margin:4px 0 8px;font-size:.7rem;letter-spacing:1.5px;color:#FFD700;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.25);border-radius:10px;padding:3px 8px;text-align:center;cursor:pointer;" onclick="window.location.href=\'../dashboard.html\'">';
      html += '<span id="evo-badge-'+p.id+'-pts">0</span> <span data-i18n="evo_pts_badge">pts para distribuir →</span>';
      html += '</div>';
    }

    // Boss (RACER-D): stats com ???; demais: valores reais
    var hideStats = (p.rarity === 'boss');
    html += statRow(p.id, 'speed', p.stats.speed, rColor, 'Velocidade', hideStats);
    html += statRow(p.id, 'ctrl',  p.stats.ctrl,  rColor, 'Controle',   hideStats);
    html += statRow(p.id, 'aero',  p.stats.aero,  rColor, 'Aerodin.',   hideStats);

    html += '<div class="card-lore" data-i18n="'+loreKey+'">'+p.lore+'</div>';
    html += '</div>'; // card-body

    // Rodapé do card: botão SELECIONAR / DESBLOQUEAR / NPC
    if(p.rarity === 'boss'){
      html += '<div class="select-btn npc-tag" data-i18n="pilots_npc">NPC</div>';
    } else if(canSelect){
      html += '<div class="select-btn"><span data-i18n="pilots_select">'
            + (selected ? '✓ '+_t('pilots_selected_btn','SELECIONADO') : '▶ '+_t('pilots_select','SELECIONAR'))
            + '</span></div>';
    } else {
      // Bloqueado: rodapé é o botão de desbloquear
      html += '<button class="select-btn unlock-btn" id="unlock-'+p.id+'" data-i18n="pilots_unlock">▶ DESBLOQUEAR ('+p.cost+' $CR)</button>';
    }

    card.innerHTML = html;

    // Liga handler de desbloqueio (precisa ser depois do innerHTML)
    if(!unlocked && p.playable){
      var ub = card.querySelector('#unlock-'+p.id);
      if(ub) ub.onclick = function(e){ e.stopPropagation(); tryUnlock(p, ub); };
    }

    return card;
  }

  function statRow(pid, key, val, color, defaultName, hide){
    var lblKey = 'stat-' + key;
    var displayVal = hide ? '???' : val;
    var widthVal = hide ? 0 : val; // bar fica em 0% pro boss
    var barStyle = hide ? 'background:'+color+';width:0%;opacity:.3' : 'background:'+color+';width:0%';
    return '<div class="stat-row">' +
      '<span class="stat-label" data-i18n="'+lblKey+'">'+defaultName+'</span>' +
      '<div class="stat-bar"><div class="stat-fill" id="sf-'+pid+'-'+key+'" data-val="'+widthVal+'" style="'+barStyle+'"></div></div>' +
      '<span class="stat-val" id="sv-'+pid+'-'+key+'" style="'+(hide?'color:'+color:'')+'">'+displayVal+'</span>' +
      '</div>';
  }

  function _hexToRgba(hex, alpha){
    if(!hex || hex.charAt(0) !== '#') return 'rgba(255,255,255,'+alpha+')';
    var n = parseInt(hex.replace('#',''),16);
    var r = (n>>16)&0xFF, g = (n>>8)&0xFF, b = n&0xFF;
    return 'rgba('+r+','+g+','+b+','+alpha+')';
  }

  // ── SELECT / UNLOCK ─────────────────────────────────────────
  function selectPilot(id){
    if(!PilotsData.select(id)){
      showToast(_t('pilots_err_pick','Não foi possível selecionar.'), 'err');
      return;
    }
    renderGrid();
    var p = PilotsData.byId(id);
    document.getElementById('selected-info').textContent =
      p.name + ' — ' + _t('pilots_choose_mode','ESCOLHA O MODO');
    document.getElementById('action-bar').classList.add('show');
    updateActionButtons(p.id);
    var target = document.getElementById('card-'+id);
    if(target) target.scrollIntoView({behavior:'smooth',block:'center'});
  }

  // Marco 2.9.2: atualiza botões da action-bar conforme tampinha aplicada ou não
  function updateActionButtons(pilotId){
    var box = document.getElementById('action-buttons');
    if(!box) return;
    var tampOk = false;
    try {
      var raw = localStorage.getItem('caprush_garage_' + pilotId);
      if(raw){
        var d = JSON.parse(raw);
        if(d && d.template && d.is_first === false) tampOk = true;
      }
    } catch(e){}
    if(!tampOk){
      // Falta tampinha — botão único leva à garagem
      box.innerHTML =
        '<a href="garagem.html" class="mode-btn garage">' +
          '<span data-i18n="pilots_pick_cap">🔧 ESCOLHER TAMPINHA →</span>' +
        '</a>';
    } else {
      // Tampinha OK — 3 botões: Solo / 2P Local / Garagem (trocar)
      box.innerHTML =
        '<a href="game/caprush-game.html" class="mode-btn solo" onclick="localStorage.setItem(\'caprush_lastmode\',\'solo\')">' +
          '<span data-i18n="pilots_solo">▶ SOLO vs IA</span>' +
        '</a>' +
        '<a href="game/game-multi-local.html" class="mode-btn duo" onclick="localStorage.setItem(\'caprush_lastmode\',\'local\')">' +
          '<span data-i18n="pilots_duo">👥 2P LOCAL</span>' +
        '</a>' +
        '<a href="garagem.html" class="mode-btn garage">' +
          '<span data-i18n="pilots_garage">🔧 GARAGEM</span>' +
        '</a>';
    }
    if(window.I18N && I18N.refresh) I18N.refresh();
  }

  function tryUnlock(p, btn){
    if(typeof CREngine === 'undefined'){
      showToast(_t('pilots_err_no_engine','Engine indisponível.'), 'err');
      return;
    }
    btn.disabled = true; btn.textContent = '...';
    CREngine.getBalance(function(balance){
      if(balance < p.cost){
        showToast(_t('pilots_err_insufficient','Saldo $CR insuficiente.'), 'err');
        btn.disabled = false; btn.textContent = _t('pilots_unlock','▶ DESBLOQUEAR');
        return;
      }
      CREngine.spendCR(p.cost, 'pilot_unlock', _t('pilots_unlock_confirm','Desbloquear')+' '+p.name, function(ok){
        if(!ok){
          showToast(_t('pilots_err_spend','Falha ao gastar $CR.'), 'err');
          btn.disabled = false; btn.textContent = _t('pilots_unlock','▶ DESBLOQUEAR');
          return;
        }
        PilotsData.unlock(p.id);
        showToast('✓ '+p.name+' '+_t('pilots_unlocked','desbloqueada!'));
        renderGrid();
      });
    });
  }

  // ── RENDER ──────────────────────────────────────────────────
  function renderGrid(){
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    var list = (currentFilter === 'all') ? PilotsData.all() : PilotsData.byRarity(currentFilter);
    list.forEach(function(p){ grid.appendChild(buildCard(p)); });

    if(window.I18N && I18N.refresh) I18N.refresh();

    // Anima stat bars
    requestAnimationFrame(function(){
      document.querySelectorAll('.stat-fill[data-val]').forEach(function(b){
        b.style.width = b.dataset.val + '%';
      });
    });

    // Atualiza action bar
    var sel = PilotsData.getSelected();
    if(sel){
      document.getElementById('selected-info').textContent =
        sel.name + ' — ' + _t('pilots_choose_mode','ESCOLHA O MODO');
      document.getElementById('action-bar').classList.add('show');
      updateActionButtons(sel.id);
    }

    applyEvoToCards();
  }

  // ── EVOLUÇÃO M2.5: badge de pontos disponíveis ─────────────
  function applyEvoToCards(){
    if(typeof PilotEvolution === 'undefined') return;
    PilotEvolution.loadAll(function(){
      PilotsData.all().forEach(function(p){
        if(!p.playable || p.rarity === 'boss') return;
        var st = PilotEvolution.getFinalStats(p.id);
        if(!st) return;
        var stats = { speed:st.speed, ctrl:st.ctrl, aero:st.aero };
        Object.keys(stats).forEach(function(k){
          var bar = document.getElementById('sf-'+p.id+'-'+k);
          var val = document.getElementById('sv-'+p.id+'-'+k);
          if(bar){ bar.dataset.val = stats[k]; bar.style.width = stats[k]+'%'; }
          if(val) val.textContent = stats[k];
        });
        var badge = document.getElementById('evo-badge-'+p.id);
        var bpts  = document.getElementById('evo-badge-'+p.id+'-pts');
        if(badge && bpts){
          if(st.pts_available > 0){ bpts.textContent = st.pts_available; badge.style.display = 'block'; }
          else badge.style.display = 'none';
        }
      });
    });
  }

  // ── INIT ────────────────────────────────────────────────────
  renderGrid();

  // Sincroniza pilotos comprados com Supabase em background
  if(typeof PilotsData.loadOwnedFromSupabase === 'function'){
    var w = localStorage.getItem('caprush_wallet');
    if(w){
      var SURL = 'https://rigghudagbzrzadsbeml.supabase.co/rest/v1/';
      var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpZ2dodWRhZ2J6cnphZHNiZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzk4OTUsImV4cCI6MjA5MTk1NTg5NX0.2fXODjCXc7IjsF7KS5cAMC-jt9ovxturuQUKmiApO9A';
      PilotsData.loadOwnedFromSupabase(SURL, { 'apikey':SKEY, 'Authorization':'Bearer '+SKEY }, w, function(){
        renderGrid();
      });
    }
  }
})();
</script>
