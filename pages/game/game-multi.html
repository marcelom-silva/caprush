<!-- Marco 2.9.2: Guard de pre-requisitos -->
<script>
(function(){
  try {
    var pid = localStorage.getItem('caprush_pilot');
    if (!pid) {
      window.location.replace('../personagens.html');
      return;
    }
    var tampOk = false;
    try {
      var raw = localStorage.getItem('caprush_garage_' + pid);
      if (raw) {
        var d = JSON.parse(raw);
        if (d && d.template && d.is_first === false) tampOk = true;
      }
    } catch(e) {}
    if (!tampOk) {
      window.location.replace('../garagem.html');
      return;
    }
  } catch(e) {
    window.location.replace('../personagens.html');
  }
})();
</script>
<script async src="https://vibej.am/2026/widget.js"></script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CapRush - Multiplayer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--red:#FF2A2A;--gold:#FFD700;--dark:#0A0A0F;--acc:#00E5FF;--muted:#666680;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:var(--dark);font-family:'Rajdhani',sans-serif;color:#E8E8F0;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,42,42,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,42,42,.04) 1px,transparent 1px);background-size:40px 40px;z-index:0;pointer-events:none;animation:gm 8s linear infinite;}
@keyframes gm{to{background-position:0 40px;}}
.center{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:2rem;padding:2rem;}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,8vw,5rem);letter-spacing:6px;background:linear-gradient(135deg,var(--red),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;}
.sub{color:var(--muted);letter-spacing:4px;font-size:.9rem;text-transform:uppercase;text-align:center;margin-top:-.5rem;}
.cards{display:flex;gap:2rem;flex-wrap:wrap;justify-content:center;}
.mode-card{
  width:260px;padding:2rem 1.5rem;
  background:rgba(14,14,26,.95);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  text-align:center;
  cursor:pointer;
  transition:transform .2s,box-shadow .2s,border-color .2s;
  text-decoration:none;
  display:flex;flex-direction:column;align-items:center;gap:1rem;
}
.mode-card:hover{transform:translateY(-8px);box-shadow:0 24px 60px rgba(0,0,0,.6);}
.mode-card.local:hover{border-color:var(--acc);box-shadow:0 24px 60px rgba(0,229,255,.15);}
.mode-card.online:hover{border-color:var(--gold);box-shadow:0 24px 60px rgba(255,215,0,.15);}
.mode-icon{font-size:3rem;line-height:1;}
.mode-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:4px;}
.mode-desc{font-size:.82rem;color:var(--muted);line-height:1.5;}
.mode-badge{font-size:.65rem;letter-spacing:3px;padding:3px 10px;border-radius:4px;text-transform:uppercase;}
.local .mode-title{color:var(--acc);}
.online .mode-title{color:var(--gold);}
.local .mode-badge{background:rgba(0,229,255,.15);color:var(--acc);border:1px solid rgba(0,229,255,.3);}
.online .mode-badge{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3);}
.back-link{color:var(--muted);font-size:.8rem;letter-spacing:2px;text-decoration:none;text-transform:uppercase;margin-top:1rem;}
.back-link:hover{color:var(--gold);}

nav{display:flex;align-items:center;padding:8px 16px;background:rgba(5,5,12,.92);border-bottom:1px solid rgba(255,42,42,.25);gap:1.2rem;position:sticky;top:0;z-index:10;}
.nav-logo{font-family:'Bebas Neue';font-size:1.2rem;letter-spacing:4px;background:linear-gradient(135deg,var(--red),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.nav-link{color:#888;font-size:.72rem;letter-spacing:2px;text-decoration:none;text-transform:uppercase;transition:color .2s;}
.nav-link:hover{color:var(--gold);}
#flag-container{display:flex;gap:5px;margin-left:auto;}
.flag-btn{width:24px;height:16px;border:1px solid rgba(255,255,255,.2);border-radius:3px;cursor:pointer;opacity:.6;background-size:cover;background-position:center;transition:.2s;}
.flag-btn:hover{opacity:1;border-color:var(--gold);}
.flag-pt{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23009b3a"/><polygon points="1.5,0.2 2.7,1 1.5,1.8 0.3,1" fill="%23ffdf00"/><circle cx="1.5" cy="1" r="0.35" fill="%23002776"/></svg>')}
.flag-us{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23b22234"/><g fill="%23fff"><rect y="0.15" width="3" height="0.15"/><rect y="0.45" width="3" height="0.15"/><rect y="0.75" width="3" height="0.15"/><rect y="1.05" width="3" height="0.15"/><rect y="1.35" width="3" height="0.15"/><rect y="1.65" width="3" height="0.15"/></g><rect width="1.2" height="1.05" fill="%233c3b6e"/></svg>')}
.flag-es{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23c60b1e"/><rect y="0.5" width="3" height="1" fill="%23ffc400"/></svg>')}
.audio-btn{background:rgba(255,42,42,.1);border:1px solid rgba(255,42,42,.3);color:#888;border-radius:3px;font-size:.8rem;padding:3px 8px;cursor:pointer;transition:.2s;}
.audio-btn:hover{background:rgba(255,42,42,.25);color:#fff;}
</style>
<script src="../../src/ui/i18n.js"></script>
</head>
<body>
<nav>
  <a href="../../index.html" class="nav-logo">CAP RUSH</a>
  <a href="../ranking.html" class="nav-link" data-i18n="ranking">RANKING</a>
  <a href="../manual.html" class="nav-link" data-i18n="manual">MANUAL</a>
  <button onclick="if(typeof toggleAudio==='function')toggleAudio();" class="audio-btn">♫</button>

    <button class="flag-btn flag-pt" onclick="setLang('pt')"></button>

<div class="center">
  <h1 data-i18n="multi_menu_title">MULTIPLAYER</h1>
  <p class="sub" data-i18n="multi_menu_sub">Escolha o modo de jogo</p>
  <div class="cards">
    <a href="game-multi-local.html" class="mode-card local">
      <div class="mode-icon">&#128101;</div>
      <div class="mode-title" data-i18n="multi_menu_local">LOCAL</div>
      <div class="mode-desc" data-i18n="multi_menu_local_desc">2 jogadores no mesmo dispositivo. Turnos alternados. Ideal para jogar lado a lado.</div>
      <div class="mode-badge" data-i18n="multi_menu_badge_local">Disponivel agora</div>
    </a>
    <a href="game-multi-online.html" class="mode-card online">
      <div class="mode-icon">&#127760;</div>
      <div class="mode-title" data-i18n="multi_menu_online">ONLINE</div>
      <div class="mode-desc" data-i18n="multi_menu_online_desc">Duelo com jogador remoto via internet. Encontre oponentes ou desafie um amigo pelo codigo da sala.</div>
      <div class="mode-badge" data-i18n="multi_menu_badge_online">Beta</div>

  </div>
  <a href="game.html" class="back-link"><span data-i18n="multi_menu_back">← Voltar ao Solo</span></a>
</div>
<script>function setLang(l){if(window.I18N)I18N.setLang(l);localStorage.setItem('lang',l);}</script>

<script>
// Mantém música do site tocando com caminho absoluto
(function(){
  // Se já existe um bgAudio global (vindo de audio.js na index.html), deixa tocando
  if(window.bgAudio && !window.bgAudio.paused) return;
  // Caso contrário, inicia a música ambiente
  var _bgm=null, _on=localStorage.getItem('audioEnabled')!=='false';
  function _start(){
    if(_bgm) return;
    _bgm=new Audio('/game/assets/audio/music/lepiten.ogg');
    _bgm.loop=true; _bgm.volume=0.38;
    if(_on) _bgm.play().catch(function(){});
  }
  window.toggleAudio=window.toggleAudio||function(){
    if(!_bgm)_start();
    if(_bgm.paused){_bgm.play();_on=true;localStorage.setItem('audioEnabled','true');}
    else{_bgm.pause();_on=false;localStorage.setItem('audioEnabled','false');}
    var btn=document.querySelector('.audio-btn');if(btn)btn.textContent=_bgm.paused?'🔇':'🔊';
  };
  window.addEventListener('load',function(){
    _start();
    document.addEventListener('click',function once(){if(_on&&_bgm&&_bgm.paused){_bgm.play().catch(function(){});}},{once:true});
  });
})();
</script>
</body>
