<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script async src="https://vibej.am/2026/widget.js"></script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CapRush — Erro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet"/>
<style>
:root{--red:#FF2A2A;--gold:#FFD700;--dark:#05050A;--acc:#00E5FF}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;background:var(--dark);color:#E8E8F0;font-family:'Rajdhani',sans-serif;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:
  radial-gradient(1000px 700px at 50% 0%,rgba(255,42,42,.16),transparent 60%),
  radial-gradient(800px 500px at 50% 110%,rgba(0,229,255,.10),transparent 60%),
  #05050A;z-index:-2;}
body::after{content:"";position:fixed;inset:0;z-index:-1;opacity:.035;
  background-image:linear-gradient(rgba(255,255,255,.1) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.1) 1px,transparent 1px);
  background-size:44px 44px}

/* NAV */
nav{display:flex;align-items:center;padding:10px 20px;background:rgba(5,5,12,.85);
  backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,42,42,.25);
  gap:1.2rem;position:sticky;top:0;z-index:50;}
.nav-logo{font-family:'Bebas Neue';font-size:1.3rem;letter-spacing:4px;
  background:linear-gradient(135deg,var(--red),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.nav-link{color:#AAA;text-decoration:none;font-size:.82rem;letter-spacing:2px;
  text-transform:uppercase;transition:.2s;}
.nav-link:hover{color:var(--gold);}
#flag-container{display:flex;gap:6px;margin-left:auto;}
.flag-btn{width:24px;height:16px;border:1px solid rgba(255,255,255,.2);border-radius:3px;
  cursor:pointer;opacity:.6;background-size:cover;background-position:center;transition:.2s;}
.flag-btn:hover{opacity:1;border-color:var(--gold);}
.flag-pt{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23009b3a"/><polygon points="1.5,0.2 2.7,1 1.5,1.8 0.3,1" fill="%23ffdf00"/><circle cx="1.5" cy="1" r="0.35" fill="%23002776"/></svg>')}
.flag-us{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23b22234"/><g fill="%23fff"><rect y="0.15" width="3" height="0.15"/><rect y="0.45" width="3" height="0.15"/><rect y="0.75" width="3" height="0.15"/><rect y="1.05" width="3" height="0.15"/><rect y="1.35" width="3" height="0.15"/><rect y="1.65" width="3" height="0.15"/></g><rect width="1.2" height="1.05" fill="%233c3b6e"/></svg>')}
.flag-es{background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="%23c60b1e"/><rect y="0.5" width="3" height="1" fill="%23ffc400"/></svg>')}
.audio-btn{background:rgba(255,42,42,.12);border:1px solid rgba(255,42,42,.3);color:#888;
  border-radius:20px;font-size:.82rem;padding:4px 10px;cursor:pointer;transition:.2s;}
.audio-btn:hover{background:rgba(255,42,42,.25);color:#ccc;}

/* HERO */
.hero{text-align:center;padding:52px 20px 30px;}
.hero h1{font-family:'Bebas Neue';font-size:clamp(2.5rem,6vw,4.5rem);
  background:linear-gradient(135deg,var(--red),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:8px;filter:drop-shadow(0 0 28px rgba(255,42,42,.28));}
.hero p.desc{color:#888;font-size:.95rem;letter-spacing:1px;margin-bottom:40px;}

/* PILOT CARDS */
.pilots{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:24px;max-width:1100px;margin:0 auto 48px;padding:0 20px;}
.pilot{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(14px);border-radius:18px;padding:22px 18px;
  transition:.3s;position:relative;overflow:hidden;text-align:center;cursor:default;}
.pilot::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0;transition:.3s;}
.pilot:hover{transform:translateY(-8px) rotate(-0.8deg);
  box-shadow:0 20px 60px rgba(0,0,0,.55),0 0 40px rgba(255,42,42,.14);
  border-color:rgba(255,215,0,.28);}
.pilot:hover::before{opacity:1;}
.pilot img{width:160px;height:200px;object-fit:contain;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,.65));
  margin-bottom:14px;transition:.3s;}
.pilot:hover img{transform:scale(1.05);}
.bubble{background:rgba(0,0,0,.65);border:1px solid rgba(255,215,0,.22);
  border-radius:10px;padding:10px 12px;font-size:.88rem;color:var(--gold);
  line-height:1.4;min-height:52px;display:grid;place-items:center;
  backdrop-filter:blur(6px);}

/* BACK BUTTON */
.back-wrap{text-align:center;padding-bottom:56px;}
.back{display:inline-block;color:#000;
  background:linear-gradient(135deg,var(--red),var(--gold));
  text-decoration:none;padding:12px 36px;border-radius:28px;
  font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:2px;
  transition:.2s;box-shadow:0 0 28px rgba(255,42,42,.28);}
.back:hover{transform:scale(1.06);box-shadow:0 0 44px rgba(255,215,0,.45);}
</style>
<script src="../src/ui/i18n.js"></script>
</head>
<body>
<nav>
  <a href="../index.html" class="nav-logo">CAP RUSH</a>
  <a href="game/caprush-game.html" class="nav-link" data-i18n="play">JOGAR</a>
  <a href="personagens.html" class="nav-link" data-i18n="pilots">PILOTOS</a>
  <a href="ranking.html" class="nav-link" data-i18n="ranking">RANKING</a>
  <a href="manual.html" class="nav-link" data-i18n="manual">MANUAL</a>
  <button id="soundBtn" onclick="toggleAudio()" class="audio-btn">🔇</button>
  <div id="flag-container">
    <button class="flag-btn flag-pt" onclick="setLang('pt')"></button>
    <button class="flag-btn flag-us" onclick="setLang('en')"></button>
    <button class="flag-btn flag-es" onclick="setLang('es')"></button>
  </div>
</nav>

<div class="hero">
  <h1 data-i18n="error-title">Ops! Algo deu errado</h1>
  <p class="desc" data-i18n="error-desc">Encontramos um problema e já estamos tratando.</p>
</div>

<div class="pilots">
  <div class="pilot">
    <img src="../assets/images/pilots/kenta-piloto-err.png" alt="Kenta"/>
    <div class="bubble" data-i18n="error-kenta">Erro 404: Pista não encontrada!</div>
  </div>
  <div class="pilot">
    <img src="../assets/images/pilots/yuki-piloto-err.png" alt="Yuki"/>
    <div class="bubble" data-i18n="error-yuki">Relaxa, já estou debugando!</div>
  </div>
  <div class="pilot">
    <img src="../assets/images/pilots/bruna-piloto-err.png" alt="Bruna"/>
    <div class="bubble" data-i18n="error-bruna">Volta pro checkpoint!</div>
  </div>
  <div class="pilot">
    <img src="../assets/images/pilots/tapz-piloto-err.png" alt="Tapz"/>
    <div class="bubble" data-i18n="error-tapz">Até anjos caem às vezes!</div>
  </div>
</div>

<div class="back-wrap">
  <a href="javascript:history.back()" class="back" data-i18n="error-back">Voltar</a>
</div>

<script>
function setLang(l){ if(window.I18N) I18N.setLang(l); localStorage.setItem('lang',l); }
</script>
<script src="../src/ui/audio.js"></script>
<script src="../src/ui/background.js"></script>
</body>
</html>
